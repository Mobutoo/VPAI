---
# workstation-common — handlers

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
  become: true

- name: Restart systemd-timesyncd
  ansible.builtin.systemd:
    name: systemd-timesyncd
    state: restarted
  become: true

- name: Reload ufw
  community.general.ufw:
    state: reloaded
  become: true

- name: Restart Docker
  ansible.builtin.systemd:
    name: docker
    state: restarted
  become: true

# Reload-only (PAS de restart networkd/tailscaled): éviter de couper la session
# SSH-via-tailscale pendant un play. OOMScoreAdjust s'applique au prochain
# restart/reboot. Anti-lockout, cohérent avec I4 (UFW).
- name: Reload systemd daemon (workstation)
  ansible.builtin.systemd:
    daemon_reload: true
  become: true
