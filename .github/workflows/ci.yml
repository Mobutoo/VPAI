---
# .github/workflows/ci.yml — Lint + Molecule tests
name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'roles/**'
      - 'playbooks/**'
      - 'inventory/**'
      - 'templates/**'
      - 'ansible.cfg'
      - 'requirements.txt'
      - 'requirements.yml'
      - '.ansible-lint'
      - '.yamllint.yml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
  # Manual trigger — dispatchable from any branch once this workflow file is
  # present on the default branch (GitHub limitation). Lets us run the full
  # lint + Molecule matrix on demand without opening a PR.
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Ansible collections
        run: |
          ansible-galaxy install -r requirements.yml

      - name: Create dummy vault password (lint only)
        run: echo "dummy" > .vault_password

      - name: YAML Lint
        run: |
          find . \( -name '*.yml' -o -name '*.yaml' \) ! -path './.git/*' ! -path './.venv/*' ! -path '*/molecule/*' ! -path '*/collections/*' ! -name 'secrets.yml' -print0 | xargs -0 yamllint -c .yamllint.yml

      - name: Ansible Lint
        run: |
          ansible-lint playbooks/stacks/site.yml playbooks/apps/webhook-relay.yml

      - name: Check no latest tags
        run: |
          set -euo pipefail
          fail=0
          # 1) Version catalogue — no floating tag values (ignore comment lines)
          if grep -vE '^[[:space:]]*#' inventory/group_vars/all/versions.yml \
               | grep -nE ':(latest|stable|main)"'; then
            echo "::error::Floating tag found in versions.yml"
            fail=1
          fi
          # 2) Image definitions in templates of roles DEPLOYED by site.yml only.
          #    Roles absent from site.yml (e.g. opencut) are intentionally skipped:
          #    they may still carry :latest and must not fail this gate.
          roles=$(grep -oE '^[[:space:]]*-[[:space:]]+role:[[:space:]]+[a-zA-Z0-9_-]+' \
                    playbooks/stacks/site.yml | awk '{print $NF}' | sort -u)
          for r in $roles; do
            d="roles/$r/templates"
            [ -d "$d" ] || continue
            if grep -rnE '^[[:space:]]*image:.*:(latest|stable)("|[[:space:]]|$)' "$d"; then
              echo "::error::Floating image tag in $d"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "FAIL: unpinned image tags found — pin them in versions.yml"
            exit 1
          fi
          echo "OK: all image tags pinned"

  molecule:
    name: Molecule — ${{ matrix.role }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        role:
          - common
          - hardening
          - docker
          - headscale-node
          - caddy
          - postgresql
          - redis
          - qdrant
          - n8n
          - litellm
          - openclaw
          - nocodb
          - plane
          - palais
          - monitoring
          - diun
          - obsidian-collector
          - docker-stack
          - n8n-provision
          - plane-provision
          - backup-config
          - uptime-config
          - vpn-dns
          - smoke-tests
          - firefly
          - flash-suite
          - grocy
          - koodia
          - mealie
          - metube
          - videoref-engine
          - zimboo
          - webhook-relay
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Ansible collections
        run: |
          ansible-galaxy install -r requirements.yml

      - name: Run Molecule converge + verify
        working-directory: roles/${{ matrix.role }}
        run: |
          molecule test
        env:
          ANSIBLE_FORCE_COLOR: "1"
          # molecule-docker destroy.yml uses non-boolean when: (lookup('env','HOME'))
          # Fixed in ansible-core 2.17+ strict boolean mode — allow until upstream fix
          ANSIBLE_ALLOW_BROKEN_CONDITIONALS: "True"
