---
# playbooks/site.yml — Playbook principal
# Déploie l'intégralité de la stack AI self-hosted
#
# Usage:
#   ansible-playbook playbooks/site.yml -e "target_env=prod"
#   ansible-playbook playbooks/site.yml -e "target_env=preprod"
#   ansible-playbook playbooks/site.yml --tags "n8n,litellm"  # Rôles spécifiques

- name: Deploy Full Stack
  hosts: "{{ target_env | default('prod') }}"
  gather_facts: true

  pre_tasks:
    - name: Display deployment info
      ansible.builtin.debug:
        msg: |
          ========================================
          Project: {{ project_display_name }}
          Environment: {{ target_env | default('prod') }}
          Target: {{ inventory_hostname }}
          Date: {{ ansible_facts['date_time']['iso8601'] }}
          ========================================
      tags: [always]

    - name: Verify Ansible version
      ansible.builtin.assert:
        that:
          - ansible_version.full is version('2.16', '>=')
        fail_msg: "Ansible 2.16+ required. Current: {{ ansible_version.full }}"
      tags: [always]

    - name: "ANTI-LOCKOUT: Validate sshd config before proceeding"
      ansible.builtin.command:
        cmd: sshd -t
      become: true
      changed_when: false
      failed_when: false
      register: sshd_preflight
      tags: [always]

    - name: "ANTI-LOCKOUT: Warn if sshd config is broken"
      ansible.builtin.debug:
        msg: |
          WARNING: sshd config validation failed.
          This is expected on first deploy (sshd not yet installed).
          Error: {{ sshd_preflight.stderr | default('sshd not found') }}
      when: sshd_preflight.rc is defined and sshd_preflight.rc != 0
      tags: [always]

  roles:
    # Phase 1 — Fondations
    - role: common
      tags: [common, phase1, core]
    - role: docker
      tags: [docker, phase1, core]
    - role: headscale-node
      tags: [headscale-node, phase1, platform]

    # Phase 2 — Données & Reverse Proxy
    - role: postgresql
      tags: [postgresql, phase2, platform]
    - role: redis
      tags: [redis, phase2, platform]
    - role: qdrant
      tags: [qdrant, phase2, platform]
    - role: caddy
      tags: [caddy, phase2, platform]

    # Phase 3 — Applications
    - role: n8n
      tags: [n8n, phase3, apps]
    - role: litellm
      tags: [litellm, phase3, apps]
    - role: nocodb
      tags: [nocodb, phase3, apps]
    - role: plane
      tags: [plane, phase3, apps]
    - role: openclaw
      tags: [openclaw, phase3, apps]
    - role: palais
      tags: [palais, phase3, apps]
    - role: kitsu
      tags: [kitsu, phase3, apps]
    - role: flash-suite
      tags: [flash-suite, phase3, apps]
    - role: dufs
      tags: [dufs, phase3, apps]
    - role: grapesjs
      tags: [grapesjs, phase3, apps]
    - role: msg2md
      tags: [msg2md, phase3, apps]
    - role: mop-templates
      tags: [mop-templates, phase3]
    - role: gotenberg
      tags: [gotenberg, phase3, apps]
    - role: carbone
      tags: [carbone, phase3, apps]
    - role: typebot
      tags: [typebot, phase3, apps]

    # Phase 4 — Observabilité
    - role: monitoring
      tags: [monitoring, phase4, monitoring]
    - role: diun
      tags: [diun, phase4, monitoring]
    - role: obsidian-collector
      tags: [obsidian-collector, phase4, monitoring]

    # Phase 4.5 — Déploiement de la stack Docker
    - role: docker-stack
      tags: [docker-stack, phase4, platform]

    # Phase 4.6 — Provisioning post-déploiement
    - role: n8n-provision
      tags: [n8n-provision, phase4, provision]
    - role: plane-provision
      tags: [plane-provision, phase4, provision]
    - role: kitsu-provision
      tags: [kitsu-provision, phase4, provision]
    - role: content-factory-provision
      tags: [content-factory-provision, phase4, provision]
    - role: app-factory-provision
      tags: [app-factory-provision, phase4, provision]

    # Phase 5 — Résilience
    - role: backup-config
      tags: [backup-config, phase5, ops]
    - role: uptime-config
      tags: [uptime-config, phase5, monitoring]

    # Phase 6 — Hardening (DERNIER - après validation complète)
    - role: hardening
      tags: [hardening, phase6, core]

  post_tasks:
    - name: "MOP | Upload Carbone template after docker-stack up"
      ansible.builtin.include_role:
        name: carbone
        tasks_from: template
      tags: [carbone-template, phase4]

    - name: Run smoke tests
      ansible.builtin.include_role:
        name: smoke-tests
      tags: [smoke-tests, always, monitoring]

# === VPN SERVER — Split DNS for admin domain access ===
# Deploys extra_records.json on Headscale server so VPN clients
# resolve admin domains to the VPS Tailscale IP (not public IP).
# Requires tailscale_ip fact from headscale-node role (set in play 1).
# Skipped when caddy_vpn_enforce is false (public validation mode).
- name: Update VPN DNS records
  hosts: vpn
  gather_facts: false
  tags: [vpn-dns, phase5, ops]

  roles:
    - role: vpn-dns
      tags: [vpn-dns, ops]
      when: caddy_vpn_enforce | default(true) | bool
