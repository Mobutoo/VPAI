---
# llamaindex-memory-worker — defaults

memory_worker_service_name: "llamaindex-memory-worker"
memory_worker_timer_name: "llamaindex-memory-worker"
memory_worker_user: "{{ workstation_pi_user | default('pi') }}"

memory_worker_install_dir: "/opt/workstation/ai-memory-worker"
memory_worker_config_dir: "/opt/workstation/configs/ai-memory-worker"
memory_worker_data_dir: "/opt/workstation/data/ai-memory-worker"
memory_worker_state_dir: "{{ memory_worker_data_dir }}/state"
memory_worker_spool_dir: "{{ memory_worker_data_dir }}/spool"
memory_worker_log_dir: "{{ memory_worker_data_dir }}/logs"
memory_worker_venv_dir: "{{ memory_worker_install_dir }}/.venv"
memory_worker_hf_home: "{{ memory_worker_data_dir }}/hf-cache"
# Cache FastEmbed (sparse BM25 v3). PERSISTANT, hors /tmp (tmpfs vide au reboot ->
# avec HF_HUB_OFFLINE=1 le worker plante "Could not load Qdrant/bm25"). Cf pre-DL ci-dessous.
memory_worker_fastembed_cache: "{{ memory_worker_data_dir }}/fastembed-cache"
memory_worker_sparse_model: "Qdrant/bm25"

memory_worker_config_file: "{{ memory_worker_config_dir }}/config.yml"
memory_worker_sources_file: "{{ memory_worker_config_dir }}/sources.yml"
memory_worker_env_file: "{{ memory_worker_config_dir }}/memory-worker.env"
memory_worker_requirements_file: "{{ memory_worker_install_dir }}/requirements.txt"
memory_worker_index_script: "{{ memory_worker_install_dir }}/index.py"
memory_worker_search_script: "{{ memory_worker_install_dir }}/search_memory.py"
memory_worker_benchmark_script: "{{ memory_worker_install_dir }}/benchmark_memory.py"
memory_worker_inventory_collections_script: "{{ memory_worker_install_dir }}/inventory_collections.py"
memory_worker_benchmark_queries_file: "{{ memory_worker_config_dir }}/benchmark-queries.yml"
memory_worker_run_report_script: "{{ memory_worker_install_dir }}/run-and-report.sh"
memory_worker_wait_calm_script: "{{ memory_worker_install_dir }}/memory-wait-calm.sh"
memory_worker_audit_report_dir: "{{ memory_worker_data_dir }}/audits"

# n8n webhook that ingests run reports (push-only model, plan section 14.3).
# Override in inventory if the n8n domain changes.
memory_worker_report_webhook_url: "https://{{ n8n_subdomain | default('mayi') }}.{{ domain_name }}/webhook/memory-run-report"
# Secret is stored in a 0600 file so it never appears in `ps` output.
memory_worker_report_webhook_secret_file: "{{ memory_worker_config_dir }}/memory-webhook-secret"
memory_worker_report_webhook_secret: "{{ memory_webhook_secret | default('') }}"

memory_worker_apt_packages:
  - python3-venv
  - python3-dev

memory_worker_python_packages:
  - "llama-index-core>=0.12,<0.13"
  - "llama-index-vector-stores-qdrant>=0.6,<0.7"
  - "qdrant-client>=1.16,<1.17"
  - "sentence-transformers>=5.1,<5.2"
  - "pyyaml>=6,<7"
  # Sparse BM25 (contrat v3 2026-06-10). Pin exact validé par sibling test R4
  # 2026-06-10 sur ARM64 waza (venv /tmp : encode doc+query OK, onnxruntime 1.26.0).
  - "fastembed==0.8.0"

# Collection cible (contrat RAG v3 2026-06-10) : la bascule memory_v2 -> memory_v3
# = override de `memory_collection_name` en inventory APRÈS validation éval — zéro code.
memory_collection_name: "memory_v2"
memory_worker_collection_name: "{{ memory_collection_name }}"
memory_worker_qdrant_url: "https://{{ qdrant_subdomain }}.{{ domain_name }}:443"
memory_worker_qdrant_api_key: "{{ qdrant_api_key }}"
memory_worker_qdrant_timeout: 30
memory_worker_qdrant_verify_tls: true

memory_worker_huggingface_token: "{{ huggingface_token | default('') }}"

# === RERANK (FIX B audit mémoire 2026-07-17) ===
# bge-reranker-v2-m3 ONNX câblé (mcp_search.py + search_memory.py) derrière ce flag,
# OFF par défaut. Benchmark Pi réel (RPi5, nice -19, 27 requêtes, modèle chargé une
# fois, 20 candidats) : +9.8s médiane / +13.6s max PAR REQUÊTE en sus du RRF (~0.6s)
# -> trop lent pour R0 interactif (budget ~3-5s). Ne PAS activer sans un modèle plus
# léger validé (ou un usage non-interactif type éval). Le repo HF par défaut de
# rerank.py (BAAI/bge-reranker-v2-m3) n'a AUCUN artefact ONNX -> model_id ci-dessous
# obligatoire pour que le flag, une fois activé, fonctionne réellement.
memory_worker_rerank_enabled: false
memory_worker_rerank_model_id: "onnx-community/bge-reranker-v2-m3-ONNX"
# Alternative légère fastembed (Xenova/ms-marco-MiniLM-L-6-v2, ~23M params) testée
# 2026-07-17 pour R0 interactif : DISQUALIFIÉE. Texte complet requis (snippet 160 car.
# aveugle) -> 9.7s médiane/requête (~= modèle lourd) ; tronqué à 400 car. -> 2.9s
# médiane (encore 2x le budget) ET recall@1 dégradé (modèle anglais MS MARCO mal
# adapté au corpus FR/code, sur-note les blobs JSON n8n). Piste rerank léger fermée.

# === FUSION (restauration recall@1, 2026-07-17) ===
# Qdrant RRF k=2 par défaut (PAS 60 — doc officielle
# https://qdrant.tech/documentation/concepts/hybrid-queries/), fusion rank-only très
# sensible au bruit de classement introduit par la croissance du corpus (82k pts, 27
# repos auto-découverts, cf docs/audits/2026-07-17-audit-memoire.md §3). DBSF
# (Distribution-Based Score Fusion, natif Qdrant, ZÉRO coût de latence additionnel)
# mesuré recall@1 +3 à +4 pts vs RRF sur golden 76 questions (0.6316->0.6711 exact,
# reproductible 2/2 exact ET 2/2 approximatif ; recall@5 inchangé 0.9737). Rollback
# instantané : memory_worker_fusion_mode: rrf.
memory_worker_fusion_mode: "dbsf"

memory_worker_embedding_model: "google/embeddinggemma-300m"
memory_worker_embedding_dim: 768
memory_worker_embedding_normalize: true
memory_worker_embedding_prompt_query: "Retrieval-query"
memory_worker_version: "2026-04-11"
# Labels the host producing the index in both Qdrant payloads and run reports.
# Must stay stable across runs so existing `host_origin` filters still match.
memory_worker_host_origin: "waza"

memory_worker_repo_roots:
  - "/home/{{ workstation_pi_user | default('pi') }}/flash-studio"
  - "{{ workstation_projects_dir }}/saas/story-engine"

# === AUTO-DECOUVERTE DES SOURCES (MANIFESTE-CREATION-PROJET) ===
# Quand enabled, le worker découvre tout repo git sous workspace_root/<wing>/<name>
# (enfants directs) — `wing` dérivé du dossier parent, `name` = basename = payload
# `repo`. Remplace la déclaration manuelle de memory_worker_sources : poser un repo
# au bon endroit suffit à l'indexer. Voir docs/runbooks/MANIFESTE-CREATION-PROJET.md.
memory_worker_workspace_root: "/home/{{ workstation_pi_user | default('pi') }}/work"
memory_worker_discovery:
  enabled: true
  workspace_root: "{{ memory_worker_workspace_root }}"
  wings:
    - infra
    - saas
    - tools
    - refdocs
  require_git: true
  # basenames exclus (curation/coût) — ajouter ici un repo à NE PAS indexer.
  # content-factory-m1 : git worktree de content-factory (en retard sur main) —
  # indexé comme repo séparé -> duplication + risque de contenu périmé remonté
  # en résultat (audit RAG 2026-07-15, P1-5). Exclure de la découverte.
  exclude_names:
    - content-factory-m1
  # globs sur chemin absolu (ex. "*/saas/archive-*")
  exclude_globs: []
  # garde-fou coût : abort si total dépassé (LOI no-silent-caps). 20 repos actuels.
  max_repos: 30
# Sources manuelles : priorité sur la découverte (collision par `name`). Pour des
# overrides de tags ou des roots hors arborescence wing. Vide = découverte pure.
memory_worker_sources_manual: []

# Active indexing sources — FALLBACK quand discovery.enabled=false (sources.yml).
# Conservé pour le mode fichier et la référence parité pod. The worker's
# merge_source_roots() uses THIS list exclusively when populated; `memory_worker_repo_roots`
# / config.yml `repos:` is only a fallback when sources.yml is empty.
# Reconciled 2026-06-05 with the live (hand-edited) sources.yml + 4 new saas repos.
# Nested repos (flash-infra in flash-studio; litellm/n8n/openclaw-docs in DOCS) are
# covered as subdirectories — no separate source required.
memory_worker_sources:
  - name: "VPAI"
    wing: "infra"
    kind: "git_repo"
    root: "/home/{{ workstation_pi_user | default('pi') }}/VPAI"
    tags:
      - "scope:vpai"
      - "kind:ansible"
  - name: "flash-studio"
    wing: "saas"
    kind: "git_repo"
    root: "/home/{{ workstation_pi_user | default('pi') }}/flash-studio"
    tags:
      - "scope:flash"
  - name: "story-engine"
    wing: "saas"
    kind: "git_repo"
    root: "{{ workstation_projects_dir }}/saas/story-engine"
    tags:
      - "scope:story-engine"
  - name: "typebot-docs"
    wing: "refdocs"
    kind: "git_repo"
    root: "{{ workstation_projects_dir }}/typebot-docs"
    tags:
      - "scope:typebot"
      - "kind:official-docs"
  # DOCS (parapluie legacy) supprimé 2026-06-10 : les doc-sets sont au premier
  # niveau ~/work/refdocs/<name> (litellm-docs, n8n-docs, openclaw-docs, wiki)
  # et couverts par l'auto-découverte — zéro déclaration manuelle (MANIFESTE).
  - name: "podpilot"
    wing: "saas"
    kind: "git_repo"
    root: "{{ workstation_projects_dir }}/saas/podpilot"
    tags:
      - "scope:podpilot"
  - name: "hawkeye"
    wing: "saas"
    kind: "git_repo"
    root: "{{ workstation_projects_dir }}/saas/hawkeye"
    tags:
      - "scope:hawkeye"
  - name: "fantrad"
    wing: "saas"
    kind: "git_repo"
    root: "{{ workstation_projects_dir }}/saas/fantrad"
    tags:
      - "scope:fantrad"
  - name: "riposte"
    wing: "saas"
    kind: "git_repo"
    root: "{{ workstation_projects_dir }}/saas/riposte"
    tags:
      - "scope:riposte"

memory_worker_include_extensions:
  - .md
  - .txt
  - .rst
  - .py
  - .js
  - .jsx
  - .ts
  - .tsx
  - .go
  - .sh
  - .sql
  - .json
  - .yml
  - .yaml
  - .j2
  - .env
  - .toml
  - .ini

memory_worker_exclude_dirs:
  - .git
  - node_modules
  - dist
  - build
  - .next
  - .turbo
  - .venv
  - .venv-test
  - venv
  - __pycache__
  - .mypy_cache
  - .pytest_cache
  - .playwright-mcp
  - coverage
  # Artefacts harnais d'éval (audit 2026-07-17-audit-memoire.md §1 FIX A) : nom
  # EXACT "eval" — jamais de sous-chaîne (matcherait "retrieval", contenu RAG légitime).
  - eval

memory_worker_max_file_bytes: 1048576
memory_worker_chunk_size: 1600
memory_worker_chunk_overlap: 200
memory_worker_max_chunks_per_file: 200
memory_worker_batch_size: 8
memory_worker_progress_every: 10
memory_worker_loadavg_threshold: 6.0
memory_worker_timer_on_boot_sec: "5m"
memory_worker_timer_on_unit_active_sec: "30m"
memory_worker_index_mode: "incremental"
memory_worker_enable_gc: true
memory_worker_gc_flag: "{{ '--gc' if memory_worker_enable_gc | bool else '' }}"

# Resource control (cgroup) — REX 2026-06-05 panne SSH waza.
# Worker non-borné (embeddinggemma-300m + sentence-transformers, pic ~3.2G RSS)
# -> OOM global -> systemd-networkd affamé -> bail DHCP eth0 expiré -> tailscale
# ENETUNREACH -> SSH mort ~6h30. Le cap cgroup tue le worker AVANT le réseau.
# OOMScoreAdjust=1000 : si OOM, ce process est la 1ère victime (jamais networkd/tailscaled, cf workstation-common).
memory_worker_memory_high: "3G"      # throttle doux (reclaim agressif au-delà)
memory_worker_memory_max: "4G"       # plafond dur (cgroup OOM-kill le worker seul)
memory_worker_memory_swap_max: "512M"
memory_worker_oom_score_adjust: 1000
# Cap threads torch/BLAS de l'embed (waza = 4 cœurs). Borne l'indexation à N cœurs
# -> laisse les autres aux sessions interactives (Claude Code). Combiné à Nice=19 +
# IO idle + calm-wait, contrôle la charge même en co-activité multi-sessions.
memory_worker_cpu_threads: 2

# Remote control (v2): systemd-user migration + SSH forced-command from n8n
memory_worker_uid: 1000                                   # uid of mobuone (XDG_RUNTIME_DIR)
memory_worker_user_unit_dir: "/home/{{ memory_worker_user }}/.config/systemd/user"
memory_worker_ssh_pubkey: "{{ memory_worker_ssh_pubkey_value | default('') }}"  # n8n-memctl public key; empty = skip authorized_key

# === HARNESS D'ÉVAL (contrat RAG v3 2026-06-10) ===
# golden.yml + run_eval.py déployés depuis scripts/memory/eval/ — tournent sur le
# venv worker (lecture seule Qdrant). Sortie JSON: .planning/eval/ côté repo.
memory_worker_eval_dir: "{{ memory_worker_install_dir }}/eval"

# === CONSOLIDATION REX (contrat RAG v3 2026-06-10) ===
# consolidate_rex.py lit docs/rex/*.md modifiés < N jours, groupe par topic et
# produit une synthèse 5-10 lignes par topic via LiteLLM (modèle économique,
# gardé par le cap budget LiteLLM existant). Sortie: docs/memory-consolidated/
# (indexée ensuite par le worker, doc_kind auto `doc`). 1 run/semaine (timer user).
memory_worker_consolidate_enabled: true
memory_worker_consolidate_service_name: "memory-consolidate-rex"
memory_worker_consolidate_script: "{{ memory_worker_install_dir }}/consolidate_rex.py"
memory_worker_consolidate_rex_dir: "{{ memory_worker_workspace_root }}/infra/VPAI/docs/rex"
memory_worker_consolidate_out_dir: "{{ memory_worker_workspace_root }}/infra/VPAI/docs/memory-consolidated"
memory_worker_consolidate_max_age_days: 14
memory_worker_consolidate_model: "claude-haiku"   # modèle économique LiteLLM (configurable)
memory_worker_consolidate_on_calendar: "Sun *-*-* 04:30:00"   # hebdo, fenêtre calme
# LiteLLM proxy (OpenAI-compatible /v1/chat/completions, cf DOCS/litellm-docs).
# La clé est injectée dans memory-worker.env (0600) — jamais en clair dans une unit.
memory_worker_litellm_base_url: "https://{{ litellm_subdomain | default('llm') }}.{{ domain_name }}/v1"
memory_worker_litellm_api_key: "{{ litellm_master_key | default('') }}"

# === GARDE-FOU ÉVAL GOLDEN HEBDO (audit mémoire 2026-07-17) ===
# Rejoue run_eval.py --assert-thresholds 1x/semaine (timer user, cadence hors heures
# interactives) pour détecter une dérive recall@1/mrr@10 AVANT qu'elle reste invisible
# des semaines (cf. dérive -13pts non détectée pendant 5 semaines faute d'éval continue).
# Défaut OFF : au 2026-07-17 memory_v3 est SOUS les deux seuils (recall@1 ~0.64 < 0.70,
# mrr@10 ~0.79 < 0.80) — un run avec les seuils par défaut échouerait (gate + alerte) dès
# le 1er tick. Activer seulement une fois memory_v3 réparée, OU accepter consciemment
# que la 1re alerte soit le signal réel du problème déjà en place.
# Activation : passer ce flag à true en inventaire puis redéployer
#   make deploy-role ROLE=llamaindex-memory-worker ENV=<env> --tags memory_eval_golden
# (equiv. ansible-playbook playbooks/hosts/workstation.yml --tags memory_eval_golden).
memory_worker_eval_golden_enabled: false
memory_worker_eval_golden_service_name: "memory-eval-golden"
# Décalé avant la consolidation REX (04:30) pour ne pas cumuler 2 jobs lourds au
# même créneau ; les deux restent bornés en mémoire (cf caps cgroup ci-dessous).
memory_worker_eval_golden_on_calendar: "Sun *-*-* 02:00:00"
memory_worker_eval_golden_mode: "hybrid"
memory_worker_eval_golden_min_recall1: 0.70
memory_worker_eval_golden_min_mrr10: 0.80
# Sortie datée dans .planning/eval/ côté repo (PAS sous memory_worker_install_dir/opt :
# REPO_ROOT calculé par run_eval.py y est /opt, non inscriptible). Nom de fichier
# construit par le wrapper avec le préfixe "eval-<collection>" — couvert par
# EXCLUDE_DIRS "eval" (dir) ET EXCLUDE_EVAL_FILE_PREFIXES (defense en profondeur,
# memory_core.py) : le run hebdo ne re-contamine jamais l'index qu'il mesure.
memory_worker_eval_golden_out_dir: "{{ memory_worker_workspace_root }}/infra/VPAI/.planning/eval"
memory_worker_eval_golden_env_file: "{{ memory_worker_config_dir }}/memory-eval-golden.env"
# Notification Telegram — réutilise le bot/canal monitoring existant (cf waza-deadman).
memory_worker_eval_golden_telegram_bot_token: "{{ telegram_monitoring_bot_token | default('') }}"
memory_worker_eval_golden_telegram_chat_id: "{{ telegram_monitoring_chat_id | default('') }}"
