---
- name: Verify n8n role
  hosts: all
  gather_facts: false
  vars:
    # Stub vars — verify.yml runs independently, does not inherit converge.yml vars
    project_name: molecule-test
  tasks:
    - name: Check n8n env file exists
      ansible.builtin.stat:
        path: "/opt/{{ project_name | default('vpai') }}/configs/n8n/n8n.env"
      register: n8n_env
      failed_when: not n8n_env.stat.exists
