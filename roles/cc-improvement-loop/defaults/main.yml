---
# cc-improvement-loop — planificateur systemd-user de la boucle d'amélioration
# continue Claude Code (P4-1, mode observation, read-only). Le script vit dans le
# lab git-local ; ce rôle ne versionne QUE les units systemd + leur activation.

cc_improvement_user: "{{ workstation_pi_user | default('mobuone') }}"
cc_improvement_uid: 1000                                   # uid mobuone (XDG_RUNTIME_DIR)
cc_improvement_user_unit_dir: "/home/{{ cc_improvement_user }}/.config/systemd/user"

# Lab git-local (jamais poussé) hébergeant continuous-improvement.sh
cc_improvement_lab_dir: "/home/{{ cc_improvement_user }}/work/ops/claude-code-improvement-lab"

cc_improvement_service_name: "cc-improvement-loop"
cc_improvement_oncalendar: "*-*-01 05:00:00"               # mensuel (governance.md §2)
cc_improvement_randomized_delay: "30m"
cc_improvement_memory_max: "2G"                            # job batch borné (REX 2026-06-05)
cc_improvement_oom_score_adjust: 1000                      # OOM-kill le job en 1er
cc_improvement_enabled: true                               # false = timer stoppé/désactivé

# Audit tokens mensuel (T1.2) : après l'observation, le service exécute
# scripts/token_audit_notify.sh (lab git-local, non versionné ici — même
# doctrine que continuous-improvement.sh). Alerte Telegram (canal établi en
# T1.1, réutilisé tel quel) si la part Opus+Fable du coût NOTIONNEL (tarif
# liste, PRICING interne au script) dépasse ce seuil. Silence si sous le
# seuil (anti-spam).
cc_improvement_token_audit_threshold_pct: 50

# Drift plugins/marketplaces (T1.3, seed 2026-07-21) : après l'audit tokens,
# le service exécute scripts/plugin_drift_check.sh (lab git-local) qui
# compare chaque plugin installé (~/.claude/plugins/installed_plugins.json)
# à son marketplace amont GitHub et signale toute marketplace non rafraîchie
# depuis plus de N jours. Origine : superpowers 5.0.4 a stagné 4 mois derrière
# l'amont (6.1.1) sans que le timer mensuel ne le détecte — la boucle
# n'auditait que les sessions/tokens, jamais les versions plugins. Détection-
# only : jamais d'auto-update (pin discipline, leçon gsd-core npx 2026-07-19).
cc_improvement_plugin_drift_stale_days: 60
