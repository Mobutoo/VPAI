---
# uptime-config — defaults

# n8n URL: dedicated subdomain if set, otherwise sub-path on admin domain
_n8n_base: >-
  {{ ('https://' ~ n8n_subdomain ~ '.' ~ domain_name)
     if (n8n_subdomain | default('')) | length > 0
     else ('https://' ~ caddy_admin_domain ~ '/n8n') }}

# --- Uptime Kuma monitors ---
# These are documented in RUNBOOK.md for manual creation on Seko-VPN
uptime_kuma_monitors:
  - name: "{{ project_display_name }} — HTTPS"
    type: "http"
    url: "https://{{ domain_name }}/health"
    interval: 60
    retryInterval: 30
    maxretries: 2
    accepted_statuscodes: ["200"]

  - name: "{{ project_display_name }} — n8n"
    type: "http"
    url: "{{ _n8n_base }}/healthz"
    interval: 60
    retryInterval: 30
    maxretries: 3

  - name: "{{ project_display_name }} — Grafana"
    type: "http"
    url: "https://{{ caddy_admin_domain }}/grafana/api/health"
    interval: 120
    maxretries: 3

  - name: "{{ project_display_name }} — PostgreSQL"
    type: "port"
    hostname: "{{ vpn_headscale_ip }}"
    port: 5432
    interval: 120
    maxretries: 2

  - name: "{{ project_display_name }} — TLS Certificate"
    type: "http"
    url: "https://{{ domain_name }}"
    interval: 86400
    expiryNotification: true
    maxredirects: 0

  - name: "{{ project_display_name }} — Backup Heartbeat"
    type: "push"
    interval: 86400

  # --- API-level monitors (2026-07-17, T0.5 loops) ---
# Incident: Plane frontend returned 200 while its API returned 500 — undetected
# because none of the monitors above test past the frontend/health surface.
#
# UNBLOCKED 2026-07-17: Seko-VPN (where Uptime Kuma runs) is now enrolled as a
# tailnet client itself (roles/headscale-node via playbooks/utils/vpn-node-enroll.yml,
# Tailscale IP 100.64.0.5) instead of being only the Headscale control server. The
# existing Headscale extra_records (work/llm/mayi/qd.ewutelo.cloud -> 100.64.0.14,
# already live in /opt/services/headscale/config/config.yaml on Seko) now resolve
# correctly from the box AND from inside the uptime-kuma container (same resolv.conf,
# verified via `docker exec uptime-kuma getent hosts` + curl, 2026-07-17) — no Caddyfile
# change, no extra_hosts workaround needed. Live curl confirmation from Seko:
#   work.ewutelo.cloud/api/v1/users/me/ -> 401 (was 403)
#   llm.ewutelo.cloud/v1/models         -> 401 (was 403)
#   qd.ewutelo.cloud/healthz            -> 200 (was 403)
#   mayi.ewutelo.cloud/healthz          -> 200 (was 403)
# Full writeup: ~/work/infra/Seko-VPN/docs/09-uptime-kuma-monitors.md.
#
# n8n API-level check is NOT duplicated here: the existing
# "{{ project_display_name }} — n8n" monitor above already targets
# `/healthz` and is unblocked by the same fix — no new definition needed.

  - name: "{{ project_display_name }} — Plane API (401-as-up)"
    type: "http"
    url: "https://{{ plane_subdomain }}.{{ domain_name }}/api/v1/users/me/"
    interval: 60
    retryInterval: 30
    maxretries: 3
    accepted_statuscodes: ["401"]
    note: >-
      No token sent on purpose: 401 proves API routing + auth middleware are
      alive; 500/404 = DOWN. Confirmed live 401 from Seko 2026-07-17.

  - name: "{{ project_display_name }} — LiteLLM /v1/models"
    type: "http"
    url: "https://{{ litellm_subdomain }}.{{ domain_name }}/v1/models"
    interval: 60
    retryInterval: 30
    maxretries: 3
    accepted_statuscodes: ["401", "200"]
    note: >-
      No key sent: 401 (auth required) or 200 (default key path) both prove
      LiteLLM answered. Confirmed live 401 from Seko 2026-07-17.

  - name: "{{ project_display_name }} — Qdrant health"
    type: "http"
    url: "https://{{ qdrant_subdomain }}.{{ domain_name }}/healthz"
    interval: 60
    retryInterval: 30
    maxretries: 3
    accepted_statuscodes: ["200"]
    note: >-
      Confirmed live 200 from Seko 2026-07-17 (/healthz is the right path).
