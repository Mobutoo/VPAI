---
# metube — defaults
# MeTube: self-hosted web UI for yt-dlp (video downloader)
# Deployed as Docker container on Workstation Pi (ARM64)

metube_install_dir: "/opt/workstation/metube"
metube_data_dir: "/opt/workstation/data/metube"

# Ports
metube_port: 8081

# Docker resource limits (RPi 5 16GB — lightweight service)
metube_memory_limit: "512M"
metube_memory_reservation: "128M"
metube_cpu_limit: "1.0"

# Subdomain (VPN-only via workstation Caddy)
metube_subdomain: "tube"

# Download directory (shared with videoref-engine)
metube_download_dir: "/opt/workstation/data/metube/downloads"

# yt-dlp output template — unique filename with title + uploader + date + ID
# %(title).80s = title truncated at 80 chars
# %(uploader).30s = uploader truncated at 30 chars
# %(upload_date>%Y%m%d)s = upload date as YYYYMMDD
# %(id)s = video ID (unique per platform)
metube_output_template: "%(title).80s [%(uploader).30s %(upload_date>%Y%m%d)s] %(id)s.%(ext)s"

# Max video quality (height in pixels)
metube_max_quality: "1080"

# yt-dlp cookies — required for Instagram/TikTok (login-gated content)
# Workflow: export Netscape cookies.txt from browser (logged-in session)
# Place at {{ metube_cookies_dir }}/cookies.txt, then set enabled: true + redeploy
metube_cookies_enabled: false
metube_cookies_dir: "/opt/workstation/metube/cookies"
