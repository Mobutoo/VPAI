---
# n8n-provision — defaults

# === REST API deploy for id-bearing workflows (R11, GOTCHAS-N8N-2.30.md §5) ===
# `n8n import:workflow` CLI silently strips node-level `webhookId` (R3-bis).
# Workflows whose rendered JSON carries a top-level "id" deploy instead via
# PUT /api/v1/workflows/:id + activate (same method as scripts/deploy-workflow.sh,
# called in-container against localhost:5678 — no Caddy /api/v1 routing needed).
# Reuses the existing owner-scoped n8n API key (vault_n8n_openclaw_api_key via
# n8n_discovery_api_key, inventory/group_vars/all/main.yml) — already proven for
# this exact call in roles/openclaw/templates/agents/concierge/IDENTITY.md.j2
# ("curl -X PUT $N8N_URL/api/v1/workflows/<id> -H X-N8N-API-KEY: $N8N_API_KEY").
# No new vault secret introduced.
n8n_provision_rest_api_key: "{{ n8n_discovery_api_key | default('') }}"

# === memory-telegram-bot (@EkengeBot) Telegram-side provisioning ===
# Idempotently registers the bot "/" command menu (setMyCommands) and arms the
# Telegram webhook (setWebhook) so updates reach the n8n workflow. The webhook
# path is exposed publicly by Caddy BEFORE the vpn_only block (see Caddyfile.j2),
# secret validated inside the workflow via X-Telegram-Bot-Api-Secret-Token.

# Public production webhook URL n8n serves for this bot (matches the workflow's
# webhook node path + the Caddy public handle).
memory_bot_webhook_url: "https://{{ n8n_subdomain }}.{{ domain_name }}/webhook/memory-telegram-bot"

# === Workflows décommissionnés (retrait runtime) ===
# Le rôle provisionne les workflows PRÉSENTS (listes inline tasks/main.yml) mais
# n'a PAS de notion de « workflow retiré » : un workflow sorti des listes reste
# ACTIF en base n8n (zombie — cf. cf-kitsu-sync resté active=t après le retrait
# repo D6). Cette liste force le retrait runtime (deactivate → archive → delete
# via /rest) par NOM EXACT. Idempotent : un nom absent de n8n = SKIP (ABSENT).
# T7b (cutover F) : reliques v1 dormantes (0 exec / 14 j, pipeline v2 = Studio+
# ContentWorkflow natif). NE PAS y mettre un workflow encore appelé.
n8n_workflows_decommission:
  - "CF Brief to Concept"
  - "CF Invalidation Engine"
  - "CF Calendar Sync"
  - "CF Kitsu Sync"

# Desired "/" command menu. Order + fields must mirror what Telegram returns
# from getMyCommands so the idempotence compare is exact (no needless re-push).
memory_bot_commands:
  - command: "memory_status"
    description: "Etat worker: dernier run + Qdrant live"
  - command: "memory_last"
    description: "5 derniers runs (compact)"
  - command: "memory_health"
    description: "Healthcheck vs seuils (pass/fail)"
  - command: "memory_start"
    description: "Action: active + demarre le timer worker"
  - command: "memory_stop"
    description: "Action: desactive le timer worker"
  - command: "memory_run"
    description: "Action: lance un index one-shot maintenant"
  - command: "memory_fix"
    description: "Action: clear lock bloque + draine le spool"
  - command: "memory_help"
    description: "Liste des commandes memory"
