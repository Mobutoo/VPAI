---
# monitoring — handlers

- name: Restart loki stack
  community.docker.docker_compose_v2:
    project_src: "/opt/{{ project_name }}"
    files:
      - docker-compose.yml
    services:
      - loki
    state: restarted
  become: true
  when: not (common_molecule_mode | default(false))

- name: Restart alloy stack
  community.docker.docker_compose_v2:
    project_src: "/opt/{{ project_name }}"
    files:
      - docker-compose.yml
    services:
      - alloy
    state: restarted
  become: true
  when: not (common_molecule_mode | default(false))

- name: Restart grafana stack
  community.docker.docker_compose_v2:
    project_src: "/opt/{{ project_name }}"
    files:
      - docker-compose.yml
    services:
      - grafana
    state: restarted
  become: true
  when: not (common_molecule_mode | default(false))

- name: Restart monitoring stack
  community.docker.docker_compose_v2:
    project_src: "/opt/{{ project_name }}"
    files:
      - docker-compose.yml
    services:
      - victoriametrics
      - loki
      - alloy
      - grafana
    state: restarted
  become: true
  when: not (common_molecule_mode | default(false))
