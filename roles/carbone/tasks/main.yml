---
- name: "Carbone | Create config dir"
  ansible.builtin.file:
    path: "{{ carbone_config_dir }}"
    state: directory
    owner: "{{ prod_user }}"
    group: "{{ prod_user }}"
    mode: "0755"
  become: true
  tags: [carbone, phase3]

- name: "Carbone | Create data dirs (UID 1000)"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"
  loop:
    - "{{ carbone_template_dir }}"
    - "{{ carbone_render_dir }}"
  become: true
  tags: [carbone, phase3]
