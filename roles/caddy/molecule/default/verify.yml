---
- name: Verify caddy role
  hosts: all
  gather_facts: false
  vars:
    # Stub vars — verify.yml runs independently, does not inherit converge.yml vars
    project_name: molecule-test
  tasks:
    - name: Check Caddyfile exists
      ansible.builtin.stat:
        path: "/opt/{{ project_name | default('vpai') }}/configs/caddy/Caddyfile"
      register: caddyfile
      failed_when: not caddyfile.stat.exists
