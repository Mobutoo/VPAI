---
# inventory/group_vars/all/versions.yml — Images Docker pinnées
# JAMAIS de :latest ou :stable — Tout est versionné
# Vérifié le : 27 mars 2026

# --- Données ---
postgresql_image: "postgres:18.3-bookworm"  # CVE-2025-8714/8715 + buffer overflows (fix 18.3, 2026-02-26)
redis_image: "redis:8.4.0-bookworm"  # CVE-2025-49844 RediShell CVSS 10.0 (fix 8.2.2+, 2025-10)
qdrant_image: "qdrant/qdrant:v1.16.3"

# --- Applications ---
openclaw_image: "ghcr.io/openclaw/openclaw:2026.3.13-1"
# n8n: image custom avec patch enterprise (roles/n8n/files/Dockerfile)
# Build: cd roles/n8n/files && docker build --build-arg N8N_VERSION=2.7.3 -t ghcr.io/mobutoo/n8n-enterprise:2.7.3 .
# Push:  docker push ghcr.io/mobutoo/n8n-enterprise:2.7.3
n8n_image: "ghcr.io/mobutoo/n8n-enterprise:2.7.3"
n8n_upstream_version: "2.7.3"  # version officielle n8nio/n8n sous-jacente
litellm_image: "ghcr.io/berriai/litellm:v1.81.3-stable"
