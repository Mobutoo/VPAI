---
# remotion — tasks
# Remotion render server on RPi 5 (ARM64)
# Based on official template: remotion-dev/template-render-server
# Uses TypeScript + tsx + system Chromium (ARM64 native)
# REX: Playwright CDN blocks ARM64 browser download → use apt chromium instead

- name: Create Remotion install directory
  ansible.builtin.file:
    path: "{{ remotion_install_dir }}"
    state: directory
    owner: "{{ workstation_pi_user }}"
    group: "{{ workstation_pi_user }}"
    mode: "0755"
  become: true

- name: Create Remotion data directories
  ansible.builtin.file:
    path: "{{ remotion_data_dir }}/{{ item }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"
  become: true
  loop:
    - renders

- name: Create Remotion source subdirectories
  ansible.builtin.file:
    path: "{{ remotion_install_dir }}/{{ item }}"
    state: directory
    owner: "{{ workstation_pi_user }}"
    group: "{{ workstation_pi_user }}"
    mode: "0755"
  become: true
  loop:
    - server
    - remotion
    - remotion/HelloWorld
    - remotion/Montage

- name: Copy Remotion root files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ remotion_install_dir }}/{{ item.dest }}"
    owner: "{{ workstation_pi_user }}"
    group: "{{ workstation_pi_user }}"
    mode: "0644"
  become: true
  loop:
    - { src: "Dockerfile", dest: "Dockerfile" }
    - { src: "package.json", dest: "package.json" }
    - { src: "remotion.config.ts", dest: "remotion.config.ts" }
    - { src: "tsconfig.json", dest: "tsconfig.json" }
  register: remotion_root_files

- name: Copy Remotion server source (TypeScript)
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ remotion_install_dir }}/{{ item.dest }}"
    owner: "{{ workstation_pi_user }}"
    group: "{{ workstation_pi_user }}"
    mode: "0644"
  become: true
  loop:
    - { src: "server/index.ts", dest: "server/index.ts" }
    - { src: "server/render-queue.ts", dest: "server/render-queue.ts" }
  register: remotion_server_files

- name: Copy Remotion compositions (TypeScript/React)
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ remotion_install_dir }}/{{ item.dest }}"
    owner: "{{ workstation_pi_user }}"
    group: "{{ workstation_pi_user }}"
    mode: "0644"
  become: true
  loop:
    - { src: "remotion/index.ts", dest: "remotion/index.ts" }
    - { src: "remotion/Root.tsx", dest: "remotion/Root.tsx" }
    - { src: "remotion/HelloWorld/HelloWorld.tsx", dest: "remotion/HelloWorld/HelloWorld.tsx" }
    - { src: "remotion/Montage/index.ts", dest: "remotion/Montage/index.ts" }
    - { src: "remotion/Montage/types.ts", dest: "remotion/Montage/types.ts" }
    - { src: "remotion/Montage/Montage.tsx", dest: "remotion/Montage/Montage.tsx" }
    - { src: "remotion/Montage/Scene.tsx", dest: "remotion/Montage/Scene.tsx" }
    - { src: "remotion/Montage/TitleCard.tsx", dest: "remotion/Montage/TitleCard.tsx" }
    - { src: "remotion/Montage/Subtitles.tsx", dest: "remotion/Montage/Subtitles.tsx" }
    - { src: "remotion/Montage/AudioMix.tsx", dest: "remotion/Montage/AudioMix.tsx" }
    - { src: "remotion/Montage/effects.tsx", dest: "remotion/Montage/effects.tsx" }
  register: remotion_composition_files

- name: Remove stale package-lock.json when package.json changes
  ansible.builtin.file:
    path: "{{ remotion_install_dir }}/package-lock.json"
    state: absent
  become: true
  when: remotion_root_files.changed
  changed_when: false

- name: Generate package-lock.json for reproducible builds
  ansible.builtin.command:
    cmd: npm install --package-lock-only --ignore-scripts
    chdir: "{{ remotion_install_dir }}"
  become: true
  become_user: "{{ workstation_pi_user }}"
  args:
    creates: "{{ remotion_install_dir }}/package-lock.json"
  changed_when: true

- name: Build Remotion Docker image (ARM64 — system Chromium)
  community.docker.docker_image:
    name: "remotion-local"
    tag: "{{ remotion_version }}"
    source: build
    build:
      path: "{{ remotion_install_dir }}"
      platform: "linux/arm64"
    force_source: >-
      {{ remotion_root_files.changed
         or remotion_server_files.changed
         or remotion_composition_files.changed }}
  become: true
  notify: Restart creative stack

- name: Wait for Remotion port to be open
  ansible.builtin.wait_for:
    host: localhost
    port: "{{ remotion_port }}"
    timeout: 120
    state: started
  changed_when: false

- name: Check Remotion health endpoint
  ansible.builtin.uri:
    url: "http://localhost:{{ remotion_port }}/health"
    method: GET
    status_code: [200]
  retries: 6
  delay: 10
  register: remotion_health
  until: remotion_health.status == 200
  changed_when: false

- name: Fail if Remotion is unhealthy
  ansible.builtin.fail:
    msg: "Remotion health check failed (status: {{ remotion_health.status | default('unknown') }})"
  when: remotion_health.status | default(0) != 200
