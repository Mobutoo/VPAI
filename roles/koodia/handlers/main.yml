---
# koodia — handlers
# Pattern: grep-guard + state: present + recreate: always (env_file reload).

- name: Check koodia service is in compose file
  ansible.builtin.command:
    cmd: grep -q "koodia" /opt/{{ project_name }}/docker-compose.yml
  register: _koodia_in_compose
  failed_when: false
  changed_when: false
  listen: Restart koodia stack

- name: Restart koodia container
  community.docker.docker_compose_v2:
    project_src: "/opt/{{ project_name }}"
    files:
      - docker-compose.yml
    services:
      - koodia
    state: present
    recreate: always
  become: true
  when:
    - not ansible_check_mode
    - _koodia_in_compose.rc | default(1) == 0
    - not (common_molecule_mode | default(false))
  listen: Restart koodia stack
