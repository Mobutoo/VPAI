  content:
    s1_content: 'Symptômes couverts : Alarme MAJOR ''No OSPF hello packets received from neighbor'' sur noeuds VHB — auto-cleared
      en <30s; Cogent prend le relai automatiquement; Coupure backbone Cogent; Impossible de se connecter à Lightsoft; NE
      et PHO passent bleu/gris sur Lightsoft.


      Impacts opérationnels : Aucun impact trafic si CLEARED. Symptome d''un protection switch photonique sous-jacent.; Instabilité
      convergence — écran bleu/gris transitoire sur NE; Instabilité transitoire (convergence) — écran bleu/gris.'
    s2_content: 'Responsable intervention : NOC / Ingénieur transmission.

      Criticitées : MINEUR→MAJEUR, MINEUR, MAJEUR, CRITIQUE.

      Escalade N+1 si TTR > 60 min ou impact service client.'
    s3_content: 'Contexte terrain (REX Q1 2026) : 9 incidents supervision recensés — Protection switch sur chassis 9603 PHO
      → interruption GCC → perte temporaire hello OSPF entre noeuds de gestion / Perte STMS / lien OOB / switch ou firewall
      OOB HS. TTR moyen : 15–45 min.'
    s3_phase1_title: 3.1.1 Phase 1 — Diagnostic initial
    s3_phase1_content: '1. Acquitter alarmes sur Lightsoft/Vizee.

      2. Identifier NE affecté et type d''alarme (NE en bleu/gris, MAJOR slot-rcpa Equipment Mismatch

      MAJOR slot-rcpb System Synchronization Failed, MAJOR <NODE>:ge-ua/0.<ID> No OSPF hello packets received from neighbor
      <DATE> <TIME>

      Affected-Trails:

      CLEARED <DATE> <TIME>).

      3. Vérifier connectivité OOB vers équipement.

      4. Consulter historique des tickets (NocoDB).'
    s3_phase2_title: 3.1.2 Phase 2 — Isolation du défaut
    s3_phase2_content: '1. Appliquer SOPs : SOP-01 → SOP-02 → SOP-08 → SOP-09 → SOP-11.

      2. Vérifier alimentation et ventilation châssis.

      3. Tester connectivité physique (SFP, fibre, câble OOB).

      4. Comparer avec NE voisins pour isoler défaut local vs réseau.'
    s3_phase3_title: 3.1.3 Phase 3 — Remédiation
    s3_phase3_content: '1. Appliquer la procédure SOP identifiée en Phase 2.

      2. Si échange matériel requis : contacter astreinte + ouvrir ticket RMA.

      3. Documenter actions dans NocoDB (champ notes).

      4. Vérifier reprise supervision Lightsoft/Vizee.'
    s3_phase4_title: 3.1.4 Phase 4 — Clôture et capitalisation
    s3_phase4_content: '1. Confirmer retour à la normale sur Lightsoft et Vizee.

      2. Clôturer ticket NocoDB avec TTR réel, cause racine, actions.

      3. Si incident récurrent : escalader vers ingénierie pour analyse RCA.

      4. Mettre à jour la présente MOP si nouveau pattern identifié.'
    s4_content: 'NE : Network Element. OOB : Out-of-Band. STMS : Synchronous Transport Management System. SFP : Small Form-factor
      Pluggable. TTR : Time To Restore.'
    _alarmes_lightsoft:
    - NE en bleu/gris
    - 'MAJOR slot-rcpa Equipment Mismatch

      MAJOR slot-rcpb System Synchronization Failed'
    - 'MAJOR <NODE>:ge-ua/0.<ID> No OSPF hello packets received from neighbor <DATE> <TIME>

      Affected-Trails:

      CLEARED <DATE> <TIME>'
    _alarmes_vizee:
    - 'Radius Account : log sessions'
    - Alarme OSPF sur noeud VHB — verifier evenement protectionSwitch simultane sur 9603
    - '[PROBLEM] RCP for optical applications in OPT9608 card is not up — Severity: High'
    _sops_references:
    - SOP-01 → SOP-02 → SOP-08 → SOP-09 → SOP-11
    - SOP-01 → SOP-03 → SOP-10 (si >10 min)
    - SOP-01 → SOP-04 → SOP-03 (→ SOP-11 si non CLEARED)
    - SOP-01 → SOP-02 → SOP-08 → SOP-11
    - SOP-01 → SOP-03 → SOP-11
    - SOP-01 → SOP-03 → SOP-06 → SOP-10 → SOP-11
    - SOP-01 → SOP-03 → SOP-02
