---
# waza-deadman — déploie le script + units systemd + active le timer (sur Sese).

- name: Ensure waza-deadman install dir
  ansible.builtin.file:
    path: "{{ deadman_install_dir }}"
    state: directory
    owner: "{{ deadman_user }}"
    group: "{{ deadman_user }}"
    mode: "0750"
  become: true

- name: Deploy waza-deadman env file (Telegram secrets)
  ansible.builtin.template:
    src: waza-deadman.env.j2
    dest: "{{ deadman_env_file }}"
    owner: "{{ deadman_user }}"
    group: "{{ deadman_user }}"
    mode: "0600"
  become: true
  no_log: true

- name: Deploy waza-deadman script
  ansible.builtin.template:
    src: waza-deadman.sh.j2
    dest: "{{ deadman_script }}"
    owner: "{{ deadman_user }}"
    group: "{{ deadman_user }}"
    mode: "0750"
  become: true

- name: Deploy waza-deadman systemd service
  ansible.builtin.template:
    src: waza-deadman.service.j2
    dest: "/etc/systemd/system/{{ deadman_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Reload systemd (waza-deadman)

- name: Deploy waza-deadman systemd timer
  ansible.builtin.template:
    src: waza-deadman.timer.j2
    dest: "/etc/systemd/system/{{ deadman_timer_name }}.timer"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Reload systemd (waza-deadman)

- name: Flush handlers to reload systemd before enabling timer
  ansible.builtin.meta: flush_handlers

- name: Enable and start waza-deadman timer
  ansible.builtin.systemd:
    name: "{{ deadman_timer_name }}.timer"
    state: started
    enabled: true
    daemon_reload: true
  become: true
  when: not ansible_check_mode
