---
# n8n — defaults

n8n_config_dir: "/opt/{{ project_name }}/configs/n8n"
n8n_data_dir: "/opt/{{ project_name }}/data/n8n"

# --- Sidecar patch enterprise (init-container + overlay volume) ---
# n8n_enterprise_dir / n8n_patched_dir sont définies dans inventory/group_vars/all/main.yml
# (PAS ici) : playbooks/ops/rollback.yml rend templates/docker-compose.yml.j2 sans charger ce
# rôle — un default de rôle n'y serait pas visible. Revue adversariale 2026-07-18, finding HIGH #2.

# GATE HUMAIN — bump de version n8n (voir assert ci-dessous dans tasks/main.yml).
# -e n8n_upgrade_confirm=yes requis quand n8n_image cible diffère de l'image du conteneur
# {{ project_name }}_n8n actuellement en cours d'exécution (migrations TypeORM one-way en
# base — RUNBOOK-N8N-UPGRADE-SIDECAR.md §3/§5). Revue adversariale 2026-07-18, finding CRITICAL.
n8n_upgrade_confirm: ""

# --- Owner provisioning (first deploy) ---
n8n_owner_email: ""
n8n_owner_first_name: ""
n8n_owner_last_name: ""
# n8n_owner_password is in secrets.yml (vault)

# --- Database ---
n8n_db_pool_size: 10

# --- Executions ---
n8n_executions_max_age_hours: 336        # 14 days retention
n8n_executions_max_count: 10000          # cap total stored executions
n8n_execution_timeout: 3600              # 1h default timeout per workflow
n8n_execution_timeout_max: 7200          # 2h max configurable via UI
n8n_concurrency_limit: 20               # max concurrent production executions

# --- Payload ---
n8n_payload_size_max: 64                 # MiB — webhook/file upload limit

# --- AI ---
n8n_ai_timeout_max: 300000               # 5 min HTTP timeout for LLM nodes (ms)

# --- Logging ---
n8n_log_level: "info"

# --- Insights ---
n8n_insights_enabled: "true"

# --- Native instance MCP server (n8n 2.30.7+, Community, aucun gate license) ---
# Expose POST/GET /mcp-server/http : l'instance devient sa propre autorité de schéma de nœuds
# (plus de désync avec le conteneur n8n-mcp docs-only). L'endpoint hérite de l'ACL Caddy
# `vpn_only` (Tailscale) + est protégé par la clé API MCP de n8n (GET /mcp/api-key, rotation
# POST /mcp/api-key/rotate). Réf : .planning/research/n8n-upgrade/r1-versions.md §4. Toggle off
# pour désactiver (retire les 2 env vars → redeploy recrée le conteneur).
n8n_native_mcp_enabled: true

# --- License (optional — set via vault for Pro/Business) ---
# n8n_license_activation_key: ""
