---
# codex-cli — defaults
# OpenAI Codex CLI on Workstation Pi (ARM64)
# Installed as npm global package

# User who runs codex-cli
codex_cli_user: "{{ workstation_pi_user | default('pi') }}"

# Config directory (stores config.toml, history)
codex_cli_config_dir: "/home/{{ codex_cli_user }}/.codex"

# npm global prefix (NodeSource on Ubuntu 24.04 ARM64 → /usr)
codex_cli_npm_prefix: "/usr"

# Pinned version — update after first validated deploy
# Check: https://www.npmjs.com/package/@openai/codex
codex_cli_npm_version: "0.106.0"

# Credential storage : file (stocke dans ~/.codex/auth.json)
# Valeurs valides : file | keyring | auto (schema: cli_auth_credentials_store)
codex_cli_credential_storage: "file"

# Modèle par défaut (via ChatGPT Plus)
# gpt-5.6 (09/07/2026) : terra = classe gpt-5.5 à 2x moins cher, quota/5h supérieur.
# Escalade cas durs (archi/sécu) par invocation : -m gpt-5.6-sol -c model_reasoning_effort="xhigh".
codex_cli_default_model: "gpt-5.6-terra"

# Reasoning effort par défaut — politique de routage 2026-07-18 (action A6) :
# codex reste sur "medium" par défaut ; seule l'escalade explicite (findings
# HIGH, cf. ops/loops/scripts/review-pr.sh) doit monter à "xhigh", via
# override par invocation (-c model_reasoning_effort="xhigh"), jamais ici.
codex_cli_reasoning_effort: "medium"
