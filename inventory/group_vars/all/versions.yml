# --- Penpot (VPS éphémère Hetzner CX23) ---
penpot_frontend_image: "penpotapp/frontend:2.6.1"
penpot_backend_image: "penpotapp/backend:2.6.1"
penpot_exporter_image: "penpotapp/exporter:2.6.1"
penpot_valkey_image: "valkey/valkey:8.1-bookworm"
penpot_pg_image: "postgres:15-bookworm"

# --- MCP Servers Pi (Docker HTTP/SSE persistants) ---
# Convention : un port dédié par service MCP, documenté ici
# 3001 → n8n-mcp (documentation n8n nodes, SQLite embarqué, docs-only)
# 3002 → réservé futur MCP server
# 3150 → openpencil-mcp (design editor MCP)
# 4401 → penpot-mcp (Penpot design tool MCP)
n8n_mcp_image_version_pinned: "2.35.5"  # pinned 2026-02-27 (sans v — Docker metadata semver pattern)
n8n_mcp_port_pi: 3001
