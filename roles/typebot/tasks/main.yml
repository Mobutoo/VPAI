---
# roles/typebot/tasks/main.yml — Typebot provisioning (dirs, env_file, PG)

- name: "Typebot | Create dirs"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ prod_user }}"
    group: "{{ prod_user }}"
    mode: "0755"
  loop:
    - "{{ typebot_config_dir }}"
    - "{{ typebot_data_dir }}"
  become: true
  tags: [typebot, phase3]

- name: "Typebot | Deploy env file"
  ansible.builtin.template:
    src: typebot.env.j2
    dest: "{{ typebot_config_dir }}/typebot.env"
    owner: "{{ prod_user }}"
    group: "{{ prod_user }}"
    mode: "0600"
  become: true
  notify: Restart typebot stack
  tags: [typebot, phase3]

# Note: Typebot database (typebot/typebot) is provisioned by docker-stack's
# provision-postgresql.sh via postgresql_databases list (single source of truth).
# No separate provisioning task needed here.
