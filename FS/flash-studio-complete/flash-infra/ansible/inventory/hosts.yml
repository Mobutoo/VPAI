---
# Service Desk inventory
# For provisioning: uses localhost + Hetzner API (dynamic inventory via add_host)
# For deploy-only: set the server IP below

all:
  children:
    service_desk:
      hosts: {}
      # Uncomment and set IP for deploy-only (skip provisioning):
      # hosts:
      #   178.x.x.x:
      #     ansible_user: root
      #     ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

  vars:
    ansible_python_interpreter: /usr/bin/python3

    # --- Domains (see domain-strategy.md) ---
    sd_domain: paultaffe.com
    sd_infra_domain: paultaffe.net
    sd_client_domain: paultaffe.fr

    # --- System ---
    sd_system_user: flash
    sd_hostname: service-desk

    # --- Secrets (override via -e @secrets.yml or SOPS) ---
    # sd_postgres_admin_password: ""
    # sd_zammad_db_password: ""
    # sd_discourse_db_password: ""
    # sd_servicedesk_db_password: ""
    # sd_discourse_admin_password: ""
    # sd_qdrant_api_key: ""
    # sd_typesense_api_key: ""
    # sd_nextauth_secret: ""
    # sd_namecheap_api_key: ""
