---
# comfyui — handlers

- name: Restart creative stack
  community.docker.docker_compose_v2:
    project_src: "/opt/workstation"
    files:
      - docker-compose-creative.yml
    state: restarted
  become: true
  failed_when: false
  when: not (common_molecule_mode | default(false))

- name: Restart comfyui-watcher
  ansible.builtin.systemd:
    name: comfyui-watcher
    state: restarted
    daemon_reload: true
  become: true
  when: not (common_molecule_mode | default(false))
