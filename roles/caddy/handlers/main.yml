---
# caddy — handlers

- name: Restart caddy stack
  community.docker.docker_compose_v2:
    project_src: "{{ caddy_docker_project_src }}"
    files:
      - "{{ caddy_docker_compose_file }}"
    services:
      - caddy
    state: restarted
  become: true
  when: not (common_molecule_mode | default(false))
