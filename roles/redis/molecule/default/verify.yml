---
- name: Verify redis role
  hosts: all
  gather_facts: false
  vars:
    # Stub vars — verify.yml runs independently, does not inherit converge.yml vars
    project_name: molecule-test
  tasks:
    - name: Check Redis config exists
      ansible.builtin.stat:
        path: "/opt/{{ project_name | default('vpai') }}/configs/redis/redis.conf"
      register: redis_conf
      failed_when: not redis_conf.stat.exists
