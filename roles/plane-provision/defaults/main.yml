---
# roles/plane-provision/defaults/main.yml — Plane provisioning defaults

# Workspace configuration
plane_workspace_slug: "ewutelo"
plane_workspace_name: "Ewutelo"
# NOTE: asset-register.json has UUID hardcoded (static file, not j2 template).
# Jarvis project UUID: 71de60ae-4218-4581-bacb-057b1436effb
# If project is recreated, update roles/n8n-provision/files/workflows/asset-register.json L40.

# User accounts
plane_admin_email: "{{ admin_email | default('admin@example.com') }}"
plane_concierge_email: "concierge@ewutelo.local"
plane_concierge_password: "{{ vault_plane_concierge_password }}"

# Agent names for API token creation
plane_agent_names:
  - "concierge"
  - "imhotep"
  - "thot"
  - "basquiat"
  - "r2d2"
  - "piccolo"
  - "cfo"
  - "maintainer"
  - "hermes"
  - "marketer"

# Custom fields for work items (PROV-04)
plane_custom_fields:
  - name: "agent_id"
    type: "text"
  - name: "cost_estimate"
    type: "number"
  - name: "confidence_score"
    type: "number"
  - name: "session_id"
    type: "text"

# API configuration
plane_api_url: "https://work.{{ domain_name }}"
plane_api_health_retries: 12
plane_api_health_delay: 10
