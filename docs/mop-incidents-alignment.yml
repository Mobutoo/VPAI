  metadata:
    doc_reference: OPSSD-03.03.M0.24-P-V1
    doc_title: 'MOP — Ports NNI/UNI OTN : pertes de signal et dégradations de service'
    doc_resume: Procédure d'intervention pour incidents sur ports NNI et UNI (pertes LOS, dégradations BER, alarmes ODU).
    doc_scope: Service Technique — Équipe NOC / exploitation transport
    doc_owner: Service Technique
    doc_verificateur: Brigitte Gomes
    doc_approbateur: Service ISO
    doc_date_vigueur: À compléter (DD/MM/YYYY)
    doc_date_revision: À compléter (DD/MM/YYYY)
  revision:
    rev1_num: '1.0'
    rev1_date: À compléter (DD/MM/YYYY)
    rev1_description: Création MOP famille PORT_NNI_UNI — 10 incidents couverts
    rev1_prepared_by: Erwin MOMBILI
    rev1_verified_by: Brigitte GOMES
    rev1_approved_by: Service ISO
  content:
    s1_content: 'Symptômes couverts : Alarme sur port UNI; Alarmes NNI 0 HB — tous ports HB impactés; Alarmes NNI 0/1 VHB
      + cascade NNI 12/13; Alarmes NNI 1 HB — tous ports HB impactés; Alarmes NNI 12 VHB + cascade HB + LB.


      Impacts opérationnels : Impact limité au client du port concerné; Perte clients HB NNI16 + tous ports LB en cascade;
      Perte clients HB NNI20 + ports LB en cascade.'
    s2_content: 'Responsable intervention : NOC / Ingénieur transmission.

      Criticitées : MAJEUR, CRITIQUE.

      Escalade N+1 si TTR > 60 min ou impact service client.'
    s3_content: 'Contexte terrain (REX Q1 2026) : 10 incidents port_nni_uni recensés — Port défectueux / Port / SFP client
      défectueux / lien client HS. TTR moyen : 15–45 min.'
    s3_phase1_title: 3.1.1 Phase 1 — Diagnostic initial
    s3_phase1_content: '1. Acquitter alarmes sur Lightsoft/Vizee.

      2. Identifier NE affecté et type d''alarme (Alarmes NNI 13 VHB + cascade, Alarmes NNI 0 HB, Alarmes NNI 16 HB + cascade
      LB).

      3. Vérifier connectivité OOB vers équipement.

      4. Consulter historique des tickets (NocoDB).'
    s3_phase2_title: 3.1.2 Phase 2 — Isolation du défaut
    s3_phase2_content: '1. Appliquer SOPs : SOP-01 → SOP-07 → SOP-10 → SOP-11 → SOP-13.

      2. Vérifier alimentation et ventilation châssis.

      3. Tester connectivité physique (SFP, fibre, câble OOB).

      4. Comparer avec NE voisins pour isoler défaut local vs réseau.'
    s3_phase3_title: 3.1.3 Phase 3 — Remédiation
    s3_phase3_content: '1. Appliquer la procédure SOP identifiée en Phase 2.

      2. Si échange matériel requis : contacter astreinte + ouvrir ticket RMA.

      3. Documenter actions dans NocoDB (champ notes).

      4. Vérifier reprise supervision Lightsoft/Vizee.'
    s3_phase4_title: 3.1.4 Phase 4 — Clôture et capitalisation
    s3_phase4_content: '1. Confirmer retour à la normale sur Lightsoft et Vizee.

      2. Clôturer ticket NocoDB avec TTR réel, cause racine, actions.

      3. Si incident récurrent : escalader vers ingénierie pour analyse RCA.

      4. Mettre à jour la présente MOP si nouveau pattern identifié.'
    s4_content: 'NNI : Network-to-Network Interface. UNI : User-to-Network Interface. LOS : Loss Of Signal. BER : Bit Error
      Rate. ODU : Optical Data Unit. OTU : Optical Transport Unit.'
