---
# n8n — handlers

# --- Race guard (finding HIGH #3, revue adversariale 2026-07-18) ---
# Le répertoire scopé-par-version de n8n_patched_dir (group_vars/all/main.yml) protège les
# BUMPS de version (chemin host neuf, jamais partagé avec l'ancien conteneur). Il ne protège
# PAS un hotfix de patch-enterprise.sh À VERSION INCHANGÉE : le marqueur détecte le hash du
# patch qui a changé et n8n-enterprise-init.sh refait `rm -rf "$DST"/* && cp -a` dans LE MÊME
# répertoire — que l'ancien conteneur n8n (même version, même bind mount host) a encore monté
# à ce moment précis (n8n-init tourne AVANT n8n via depends_on: service_completed_successfully,
# mais l'ancien n8n n'est stoppé qu'APRÈS, quand compose le recrée). Un bind mount Linux n'a
# aucune isolation copy-on-write entre deux montages du même répertoire hôte : un rm -rf ici
# est visible instantanément dans l'autre conteneur. Fix : arrêter n8n AVANT de laisser
# n8n-init réécrire l'arbre partagé, uniquement si le conteneur existe déjà (ne JAMAIS laisser
# docker_container en créer un sans image — 1er déploiement, REX-59).
#
# Ansible ne notifie PAS un handler `block:` par son nom ("handler not found") : les deux étapes
# sont donc des handlers plats reliés par `listen`. L'ordre d'exécution suit l'ordre de
# DÉFINITION dans ce fichier (check → stop → Restart), pas l'ordre du notify.
- name: Check n8n container exists before Sidecar re-patch (race guard, finding HIGH 3)
  become: true
  community.docker.docker_container_info:
    name: "{{ project_name }}_n8n"
  register: n8n_stop_guard_info
  listen: Stop n8n before Sidecar re-patch
  when: not (common_molecule_mode | default(false))

- name: Stop the running n8n container (frees the shared patched-tree before n8n-init rewrites it)
  become: true
  community.docker.docker_container:
    name: "{{ project_name }}_n8n"
    state: stopped
  listen: Stop n8n before Sidecar re-patch
  when:
    - not (common_molecule_mode | default(false))
    - n8n_stop_guard_info.exists | default(false)

- name: Restart n8n stack
  community.docker.docker_compose_v2:
    project_src: "/opt/{{ project_name }}"
    files:
      - docker-compose.yml
    services:
      - n8n-init
      - n8n
    state: present
    # REX: recreate: always requis — state: restarted ne relit pas l'env_file.
    # Voir TROUBLESHOOTING.md section 11.18 + roles/nocodb/handlers/main.yml.
    recreate: always
  become: true
  failed_when: false  # Ne pas échouer si docker-compose.yml n'existe pas encore
  when: not (common_molecule_mode | default(false))
