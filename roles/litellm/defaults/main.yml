---
# litellm — defaults

litellm_config_dir: "/opt/{{ project_name }}/configs/litellm"

# --- UI Admin ---
litellm_ui_username: ""
# litellm_ui_password is in secrets.yml (vault)
# litellm_salt_key is in secrets.yml (vault)

# --- Alias qwen-cf (gap-analysis content-factory) ---
# Endpoint RunPod serverless cf-llm (Qwen2.5-14B-AWQ, worker-v1-vllm, scale-to-zero,
# US-IL-1) — provisionné 2026-07-09, cf. content-factory infra/podpilot/
# RUNBOOK-LLM-ENDPOINT.md §8-bis. Cold start ~157 s : les clients doivent poser
# un timeout ≥240 s (cf-api gaps.py le fait).
litellm_qwen_cf_endpoint_id: "hizahkyaanf2lh"

# --- Routing ---
# Strategy: usage-based-routing-v2 distributes across providers weighted by capacity
litellm_routing_strategy: "usage-based-routing-v2"
litellm_enable_tag_filtering: true

# --- Cache ---
# Semantic cache: Redis exact match + Qdrant semantic similarity
litellm_cache_type: "qdrant-semantic"
litellm_cache_ttl: 3600
litellm_cache_similarity_threshold: 0.85

# --- Request settings ---
litellm_num_retries: 2
litellm_request_timeout: 120

# --- Budget global (hard cap cross-providers) ---
litellm_budget_global_daily: 5.00
litellm_budget_alert_warning: 0.70
litellm_budget_alert_critical: 0.90

# BytePlus budget mensuel (vidéo Seedance — ponctuel, hors budget journalier)
litellm_byteplus_budget_monthly: 5.00
