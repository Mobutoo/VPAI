---
# common — defaults

common_packages:
  - curl
  - wget
  - jq
  - gnupg
  - ca-certificates
  - locales
  - python3-pip
  - unzip
  - htop
  - ncdu
  - tmux
  - lsb-release
  - net-tools
  - rsync
  - at

common_locale: "{{ locale }}"
common_timezone: "{{ timezone }}"
common_hostname: "{{ prod_hostname }}"

common_headscale_ip: "{{ vpn_headscale_ip }}"
common_headscale_hostname: "{{ vpn_hostname }}"

common_project_base: "/opt/{{ project_name }}"
common_project_dirs:
  - "configs"
  - "data"
  - "logs"
  # NOTE: 'backups' intentionally excluded — backup-config role owns /opt/{project}/backups
  # with mode 0750. Including it here (0755) causes competing mode changes on every run.

common_sysctl_settings:
  vm.swappiness: 10
  net.core.somaxconn: 65535
  fs.file-max: 100000
  kernel.panic: 10
  kernel.panic_on_oops: 1

# --- Swap conditionnel (active si RAM < 6 Go) ---
common_swap_enable: true
common_swap_size_mb: 2048
common_swap_file: "/swapfile"

common_ntp_servers:
  - "0.pool.ntp.org"
  - "1.pool.ntp.org"

# --- Molecule / Docker compatibility ---
# Set to true in molecule converge.yml to skip tasks that fail in Docker:
#   - systemd service management (systemctl unavailable without full init)
#   - /etc/hosts modification (bind-mounted, rename fails with ERRNO 16)
#   - sysctl settings (may fail in unprivileged namespace)
#   - swap configuration (swapon may not be available in container)
common_molecule_mode: false
