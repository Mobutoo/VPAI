---
# grocy — handlers
# Pattern: grep-guard + state: present + recreate: always (env_file reload).

- name: Check grocy service is in compose file
  ansible.builtin.command:
    cmd: grep -q "grocy" /opt/{{ project_name }}/docker-compose.yml
  register: _grocy_in_compose
  failed_when: false
  changed_when: false
  listen: Restart grocy stack

- name: Restart grocy container
  community.docker.docker_compose_v2:
    project_src: "/opt/{{ project_name }}"
    files:
      - docker-compose.yml
    services:
      - grocy
    state: present
    recreate: always
  become: true
  when:
    - not ansible_check_mode
    - _grocy_in_compose.rc | default(1) == 0
    - not (common_molecule_mode | default(false))
  listen: Restart grocy stack
