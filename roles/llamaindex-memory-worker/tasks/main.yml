---
# llamaindex-memory-worker — tasks

- name: Install memory worker apt packages
  ansible.builtin.apt:
    name: "{{ memory_worker_apt_packages }}"
    state: present
    update_cache: true
  become: true

- name: Create memory worker directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(memory_worker_user) }}"
    group: "{{ item.group | default(memory_worker_user) }}"
    mode: "{{ item.mode | default('0755') }}"
  loop:
    - path: "{{ memory_worker_install_dir }}"
    - path: "{{ memory_worker_config_dir }}"
    - path: "{{ memory_worker_data_dir }}"
    - path: "{{ memory_worker_state_dir }}"
    - path: "{{ memory_worker_spool_dir }}"
    - path: "{{ memory_worker_log_dir }}"
    - path: "{{ memory_worker_hf_home }}"
    - path: "{{ memory_worker_audit_report_dir }}"
  become: true

- name: Create memory worker virtualenv
  ansible.builtin.command:
    cmd: "python3 -m venv {{ memory_worker_venv_dir }}"
  args:
    creates: "{{ memory_worker_venv_dir }}/bin/python"
  become: true

- name: Deploy memory worker requirements
  ansible.builtin.template:
    src: requirements.txt.j2
    dest: "{{ memory_worker_requirements_file }}"
    owner: "{{ memory_worker_user }}"
    group: "{{ memory_worker_user }}"
    mode: "0644"
  become: true

- name: Install memory worker Python packages
  ansible.builtin.pip:
    requirements: "{{ memory_worker_requirements_file }}"
    virtualenv: "{{ memory_worker_venv_dir }}"
    virtualenv_python: python3
    state: present
  become: true

- name: Deploy memory worker environment file
  ansible.builtin.template:
    src: memory-worker.env.j2
    dest: "{{ memory_worker_env_file }}"
    owner: "{{ memory_worker_user }}"
    group: "{{ memory_worker_user }}"
    mode: "0600"
  become: true
  no_log: true
  tags: [llamaindex-memory-worker, memory_remote]

- name: Deploy memory worker config
  ansible.builtin.template:
    src: config.yml.j2
    dest: "{{ memory_worker_config_file }}"
    owner: "{{ memory_worker_user }}"
    group: "{{ memory_worker_user }}"
    mode: "0644"
  become: true

- name: Deploy memory worker sources config
  ansible.builtin.template:
    src: sources.yml.j2
    dest: "{{ memory_worker_sources_file }}"
    owner: "{{ memory_worker_user }}"
    group: "{{ memory_worker_user }}"
    mode: "0644"
  become: true

- name: Deploy shared memory_core module (single source of truth, parity worker/pod)
  ansible.builtin.copy:
    src: "{{ role_path }}/../../scripts/memory/memory_core.py"
    dest: "{{ memory_worker_install_dir }}/memory_core.py"
    owner: "{{ memory_worker_user }}"
    group: "{{ memory_worker_user }}"
    mode: "0644"
  become: true
  tags: [llamaindex-memory-worker, memory_remote]

- name: Deploy memory worker index script
  ansible.builtin.template:
    src: index.py.j2
    dest: "{{ memory_worker_index_script }}"
    owner: "{{ memory_worker_user }}"
    group: "{{ memory_worker_user }}"
    mode: "0755"
  become: true
  tags: [llamaindex-memory-worker, memory_remote]

- name: Deploy memory worker search script
  ansible.builtin.template:
    src: search_memory.py.j2
    dest: "{{ memory_worker_search_script }}"
    owner: "{{ memory_worker_user }}"
    group: "{{ memory_worker_user }}"
    mode: "0755"
  become: true

- name: Deploy MCP search server (source of truth = files/mcp_search.py, copié de /opt 2026-06-10)
  ansible.builtin.copy:
    src: mcp_search.py
    dest: "{{ memory_worker_install_dir }}/mcp_search.py"
    owner: "{{ memory_worker_user }}"
    group: "{{ memory_worker_user }}"
    mode: "0755"
  become: true
  tags: [llamaindex-memory-worker, memory_remote]

- name: Deploy rerank module (lazy bge-reranker ONNX — consommé par search_memory.py --rerank)
  ansible.builtin.copy:
    src: "{{ role_path }}/../../scripts/memory/rerank.py"
    dest: "{{ memory_worker_install_dir }}/rerank.py"
    owner: "{{ memory_worker_user }}"
    group: "{{ memory_worker_user }}"
    mode: "0644"
  become: true
  tags: [llamaindex-memory-worker, memory_remote]

- name: Deploy qdrant_bootstrap_v3 helper (création idempotente collection hybrid v3)
  ansible.builtin.copy:
    src: "{{ role_path }}/../../scripts/memory/qdrant_bootstrap_v3.py"
    dest: "{{ memory_worker_install_dir }}/qdrant_bootstrap_v3.py"
    owner: "{{ memory_worker_user }}"
    group: "{{ memory_worker_user }}"
    mode: "0755"
  become: true
  tags: [llamaindex-memory-worker, memory_remote]

- name: Ensure eval harness directory
  ansible.builtin.file:
    path: "{{ memory_worker_eval_dir }}"
    state: directory
    owner: "{{ memory_worker_user }}"
    group: "{{ memory_worker_user }}"
    mode: "0755"
  become: true
  tags: [llamaindex-memory-worker, memory_remote]

- name: Deploy eval harness (golden.yml + run_eval.py — contrat RAG v3, lecture seule Qdrant)
  ansible.builtin.copy:
    src: "{{ role_path }}/../../scripts/memory/eval/{{ item.name }}"
    dest: "{{ memory_worker_eval_dir }}/{{ item.name }}"
    owner: "{{ memory_worker_user }}"
    group: "{{ memory_worker_user }}"
    mode: "{{ item.mode }}"
  become: true
  loop:
    - { name: "golden.yml", mode: "0644" }
    - { name: "run_eval.py", mode: "0755" }
  loop_control:
    label: "{{ item.name }}"
  tags: [llamaindex-memory-worker, memory_remote]

- name: Deploy REX consolidation script (synthèses hebdo via LiteLLM, contrat RAG v3)
  ansible.builtin.copy:
    src: "{{ role_path }}/../../scripts/memory/consolidate_rex.py"
    dest: "{{ memory_worker_consolidate_script }}"
    owner: "{{ memory_worker_user }}"
    group: "{{ memory_worker_user }}"
    mode: "0755"
  become: true
  tags: [llamaindex-memory-worker, memory_remote]

- name: Deploy memory worker benchmark script
  ansible.builtin.template:
    src: benchmark_memory.py.j2
    dest: "{{ memory_worker_benchmark_script }}"
    owner: "{{ memory_worker_user }}"
    group: "{{ memory_worker_user }}"
    mode: "0755"
  become: true

- name: Deploy memory worker collection inventory script
  ansible.builtin.template:
    src: inventory_collections.py.j2
    dest: "{{ memory_worker_inventory_collections_script }}"
    owner: "{{ memory_worker_user }}"
    group: "{{ memory_worker_user }}"
    mode: "0755"
  become: true

- name: Deploy memory worker benchmark queries
  ansible.builtin.template:
    src: benchmark-queries.yml.j2
    dest: "{{ memory_worker_benchmark_queries_file }}"
    owner: "{{ memory_worker_user }}"
    group: "{{ memory_worker_user }}"
    mode: "0644"
  become: true

- name: Deploy memory worker run-and-report wrapper
  ansible.builtin.template:
    src: run-and-report.sh.j2
    dest: "{{ memory_worker_run_report_script }}"
    owner: "{{ memory_worker_user }}"
    group: "{{ memory_worker_user }}"
    mode: "0755"
  become: true

- name: Deploy memory worker loadavg wait script
  ansible.builtin.template:
    src: memory-wait-calm.sh.j2
    dest: "{{ memory_worker_wait_calm_script }}"
    owner: "{{ memory_worker_user }}"
    group: "{{ memory_worker_user }}"
    mode: "0755"
  become: true

- name: Deploy memory worker webhook secret file
  ansible.builtin.copy:
    content: "{{ memory_worker_report_webhook_secret }}"
    dest: "{{ memory_worker_report_webhook_secret_file }}"
    owner: "{{ memory_worker_user }}"
    group: "{{ memory_worker_user }}"
    mode: "0600"
  become: true
  no_log: true
  when: memory_worker_report_webhook_secret | length > 0

- name: Stat legacy SYSTEM unit files
  ansible.builtin.stat:
    path: "/etc/systemd/system/{{ item }}"
  become: true
  loop:
    - "{{ memory_worker_service_name }}.service"
    - "{{ memory_worker_timer_name }}.timer"
  register: legacy_unit_stat
  tags: [llamaindex-memory-worker, memory_remote]

- name: Disable + stop legacy SYSTEM units (only if present — keeps 2nd run quiet & idempotent)
  ansible.builtin.systemd:
    name: "{{ item.item }}"
    state: stopped
    enabled: false
  become: true
  loop: "{{ legacy_unit_stat.results }}"
  when: item.stat.exists
  loop_control:
    label: "{{ item.item }}"
  tags: [llamaindex-memory-worker, memory_remote]

- name: Remove legacy SYSTEM unit files
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ item }}"
    state: absent
  become: true
  loop:
    - "{{ memory_worker_service_name }}.service"
    - "{{ memory_worker_timer_name }}.timer"
  notify: Reload systemd (system)
  tags: [llamaindex-memory-worker, memory_remote]

- name: Enable linger for the memory-worker user (runs user units without login)
  ansible.builtin.command: "loginctl enable-linger {{ memory_worker_user }}"
  become: true
  args:
    creates: "/var/lib/systemd/linger/{{ memory_worker_user }}"
  tags: [llamaindex-memory-worker, memory_remote]

- name: Ensure user systemd unit dir
  ansible.builtin.file:
    path: "{{ memory_worker_user_unit_dir }}"
    state: directory
    owner: "{{ memory_worker_user }}"
    group: "{{ memory_worker_user }}"
    mode: "0755"
  become: true
  tags: [llamaindex-memory-worker, memory_remote]

- name: Deploy USER units (names MUST match memctl defaults)
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ memory_worker_user_unit_dir }}/{{ item.dest }}"
    owner: "{{ memory_worker_user }}"
    group: "{{ memory_worker_user }}"
    mode: "0644"
  become: true
  loop:
    - { src: "memory-worker.service.user.j2", dest: "{{ memory_worker_service_name }}.service" }
    - { src: "memory-worker.timer.user.j2", dest: "{{ memory_worker_timer_name }}.timer" }
  notify: Reload systemd (user)
  tags: [llamaindex-memory-worker, memory_remote]

- name: Deploy REX consolidation USER units (oneshot + timer hebdo)
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ memory_worker_user_unit_dir }}/{{ item.dest }}"
    owner: "{{ memory_worker_user }}"
    group: "{{ memory_worker_user }}"
    mode: "0644"
  become: true
  loop:
    - { src: "memory-consolidate-rex.service.user.j2", dest: "{{ memory_worker_consolidate_service_name }}.service" }
    - { src: "memory-consolidate-rex.timer.user.j2", dest: "{{ memory_worker_consolidate_service_name }}.timer" }
  notify: Reload systemd (user)
  tags: [llamaindex-memory-worker, memory_remote]

- name: Deploy memctl.sh + memctl-remote.sh
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ memory_worker_install_dir }}/{{ item }}"
    owner: "{{ memory_worker_user }}"
    group: "{{ memory_worker_user }}"
    mode: "0755"
  become: true
  loop:
    - memctl.sh
    - memctl-remote.sh
  tags: [llamaindex-memory-worker, memory_remote]

- name: Ensure the user systemd instance is running (creates the XDG runtime dir after fresh linger)
  ansible.builtin.systemd:
    name: "user@{{ memory_worker_uid }}.service"
    state: started
  become: true
  tags: [llamaindex-memory-worker, memory_remote]

- name: Flush handlers so daemon-reload happens before enable
  ansible.builtin.meta: flush_handlers

- name: Enable + start USER timer (kills the dormancy root cause — non-negotiable)
  ansible.builtin.systemd:
    name: "{{ memory_worker_timer_name }}.timer"
    scope: user
    enabled: true
    state: started
    daemon_reload: true
  become: true
  become_user: "{{ memory_worker_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ memory_worker_uid }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ memory_worker_uid }}/bus"
  tags: [llamaindex-memory-worker, memory_remote]

- name: Enable + start REX consolidation USER timer (hebdo — désactivable via memory_worker_consolidate_enabled)
  ansible.builtin.systemd:
    name: "{{ memory_worker_consolidate_service_name }}.timer"
    scope: user
    enabled: "{{ memory_worker_consolidate_enabled | bool }}"
    state: "{{ 'started' if memory_worker_consolidate_enabled | bool else 'stopped' }}"
    daemon_reload: true
  become: true
  become_user: "{{ memory_worker_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ memory_worker_uid }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ memory_worker_uid }}/bus"
  tags: [llamaindex-memory-worker, memory_remote]

- name: Install n8n-memctl forced-command SSH key
  ansible.posix.authorized_key:
    user: "{{ memory_worker_user }}"
    key: "{{ memory_worker_ssh_pubkey }}"
    state: present
    exclusive: false
    key_options: 'command="{{ memory_worker_install_dir }}/memctl-remote.sh",no-pty,no-port-forwarding,no-agent-forwarding,no-X11-forwarding'
  become: true
  when: memory_worker_ssh_pubkey | length > 0
  tags: [llamaindex-memory-worker, memory_remote]

- name: Verify memory worker script imports
  ansible.builtin.command:
    cmd: "{{ memory_worker_venv_dir }}/bin/python -m py_compile {{ item }}"
  loop:
    - "{{ memory_worker_install_dir }}/memory_core.py"
    - "{{ memory_worker_index_script }}"
    - "{{ memory_worker_search_script }}"
    - "{{ memory_worker_benchmark_script }}"
    - "{{ memory_worker_inventory_collections_script }}"
    - "{{ memory_worker_install_dir }}/mcp_search.py"
    - "{{ memory_worker_install_dir }}/rerank.py"
    - "{{ memory_worker_install_dir }}/qdrant_bootstrap_v3.py"
    - "{{ memory_worker_eval_dir }}/run_eval.py"
    - "{{ memory_worker_consolidate_script }}"
  changed_when: false
  become: true
  tags: [llamaindex-memory-worker, memory_remote]
