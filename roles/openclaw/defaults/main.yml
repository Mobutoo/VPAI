---
# openclaw — defaults

openclaw_config_dir: "/opt/{{ project_name }}/configs/openclaw"
openclaw_data_dir: "/opt/{{ project_name }}/data/openclaw"

# Gateway port (WebSocket control plane + Control UI)
openclaw_gateway_port: 18789

# Gateway bind mode: loopback | lan | tailnet
# "lan" required for Docker (container must accept connections from Caddy network)
openclaw_gateway_bind: "lan"

# Default agent model (resolved from active profile, overridable)
openclaw_default_model: "{{ openclaw_model_profiles[openclaw_model_profile].default }}"

# Node.js heap size in MB (prevents OOM crashes on large context windows)
# Raised from 768 to 1024 for v2026.3.13+ (plugin-sdk bundling + dashboard v2)
openclaw_node_heap_mb: 1024

# --- OpenAI OAuth (Codex — ChatGPT Plus/Pro subscription auth) ---
# OpenClaw gère l'OAuth nativement via auth-profiles.json (pas dans ce fichier).
# Flow : `openclaw models auth login --provider openai-codex` sur le serveur.
# Quand activé, OpenClaw utilise le token OAuth en priorité sur OPENAI_API_KEY.
# L'abonnement ChatGPT Plus couvre les requêtes (pas de crédits API consommés).
# Callback local : http://127.0.0.1:1455/auth/callback (PKCE flow).
# Tokens auto-refresh. Credentials stockés dans :
#   /opt/{{ project_name }}/data/openclaw/state/identity/auth-profiles.json

# --- Context Engine & Compaction ---
# Plugin slot: "legacy" (built-in) or plugin ID (e.g. "lossless-claw")
# lossless-claw requires PR #22201 merged upstream — use "legacy" until then.
openclaw_context_engine: "legacy"

# Max context window tokens (model-dependent: claude=200k, deepseek=128k, grok=131k)
openclaw_context_tokens: 128000

# Compaction: summarizes old turns to free context space
# mode: "default" (standard) or "safeguard" (chunked, for long histories)
openclaw_compaction_mode: "default"
# Reserve this many tokens before compaction triggers
openclaw_compaction_reserve_tokens: 24000
# AGENTS.md / SOUL.md sections re-injected after compaction (match exact headings)
openclaw_compaction_sections: '["Regles Systeme", "Discipline"]'
# Note: compaction uses the agent's own model (no separate model override in v2026.3.7)

# Memory flush: save important context to Qdrant BEFORE compaction runs
# This prevents losing critical facts during summarization.
openclaw_memory_flush_enabled: true
openclaw_memory_flush_threshold: 6000

# Context pruning: clean up old large tool results (file reads, web fetches)
# mode: "off" or "cache-ttl" (auto-prune after TTL)
openclaw_context_pruning_mode: "cache-ttl"
openclaw_context_pruning_ttl: "1h"
openclaw_context_pruning_keep: 3
openclaw_context_pruning_min_chars: 50000

# --- Sandbox (agent tool execution isolation) ---
# Sandbox requires Docker socket mount — Gateway spawns isolated containers
# Modes: "off" (no sandbox), "non-main" (sandbox subagents only), "all" (full isolation)
openclaw_sandbox_mode: "non-main"
openclaw_sandbox_image: "openclaw-sandbox:bookworm-slim"
openclaw_sandbox_memory: "512m"
openclaw_sandbox_cpus: 1
# Extra APT packages to install in sandbox (e.g., redis-tools for redis-cli)
openclaw_sandbox_extra_packages:
  - redis-tools

# --- Volume Isolation (moltworker pattern) ---
# When enabled, splits the flat openclaw data dir into 3 layers:
#   system/ (ro) — openclaw.json, agents/, skills/, plugins/
#   workspace/ (rw) — user livrables (books, prospection, output)
#   state/ (rw) — sessions, canvas, cron, memory
# This prevents prompt injection or compromised agents from modifying system configs.
openclaw_volume_isolation: true
openclaw_system_dir: "/opt/{{ project_name }}/data/openclaw/system"
openclaw_workspace_dir: "/opt/{{ project_name }}/data/openclaw/workspace"
openclaw_state_dir: "/opt/{{ project_name }}/data/openclaw/state"

# Workspace subdirectories (user data — livrables, content, projects)
openclaw_workspace_subdirs:
  - books
  - prospection
  - output
  - finance
  - ops

# State subdirectories (runtime data — sessions, canvas, cron, memory)
openclaw_state_subdirs:
  - sessions
  - canvas
  - cron
  - memory
  - telegram
  - identity
  - sandboxes
  - devices

# --- Multi-Agent Configuration ---
# Agent names (placeholders — updated later when user chooses names)
openclaw_agent_concierge_name: "concierge"
openclaw_agent_builder_name: "builder"
openclaw_agent_writer_name: "writer"
openclaw_agent_artist_name: "artist"
openclaw_agent_tutor_name: "tutor"
openclaw_agent_explorer_name: "explorer"
openclaw_agent_marketer_name: "marketer"
openclaw_agent_cfo_name: "cfo"
openclaw_agent_maintainer_name: "maintainer"
openclaw_agent_messenger_name: "messenger"
openclaw_agent_director_name: "director"

# Structured agents list — used for provisioning and workflow integration
openclaw_agents_list:
  - id: "{{ openclaw_agent_concierge_name }}"
    name: "Mobutoo"
    type: "orchestrator"
    model: "{{ openclaw_concierge_model }}"
  - id: "{{ openclaw_agent_builder_name }}"
    name: "Imhotep"
    type: "builder"
    model: "{{ openclaw_builder_model }}"
  - id: "{{ openclaw_agent_writer_name }}"
    name: "Thot"
    type: "writer"
    model: "{{ openclaw_writer_model }}"
  - id: "{{ openclaw_agent_artist_name }}"
    name: "Basquiat"
    type: "artist"
    model: "{{ openclaw_artist_model }}"
  - id: "{{ openclaw_agent_tutor_name }}"
    name: "Piccolo"
    type: "tutor"
    model: "{{ openclaw_tutor_model }}"
  - id: "{{ openclaw_agent_explorer_name }}"
    name: "R2D2"
    type: "explorer"
    model: "{{ openclaw_explorer_model }}"
  - id: "{{ openclaw_agent_marketer_name }}"
    name: "Marketer"
    type: "marketer"
    model: "{{ openclaw_marketer_model }}"
  - id: "{{ openclaw_agent_cfo_name }}"
    name: "CFO"
    type: "finance"
    model: "{{ openclaw_cfo_model }}"
  - id: "{{ openclaw_agent_maintainer_name }}"
    name: "Maintainer"
    type: "devops"
    model: "{{ openclaw_maintainer_model }}"
  - id: "{{ openclaw_agent_messenger_name }}"
    name: "Hermes"
    type: "messenger"
    model: "{{ openclaw_messenger_model }}"
  - id: "{{ openclaw_agent_director_name }}"
    name: "Aigle"
    type: "director"
    model: "{{ openclaw_director_model }}"

# --- Model Profiles ---
# Switch ALL agent models at once by changing openclaw_model_profile.
# eco      = free models only ($0/day — DeepSeek, Qwen via OpenRouter)
# balanced = mid-tier paid models (GLM-5, DeepSeek R1 — ~$1-2/day)
# premium  = best quality models (Claude, GPT-4o — ~$3-5/day)
#
# Switch method: Ansible redeploy, or via Palais dashboard (live profile switch).
# Individual agent models can still be overridden in group_vars/all/main.yml.
# NOTE: kimi-k2 ecarté — tokens tool_call_begin/end fuient en texte brut (bug upstream).
# NOTE: openai/ provider = OpenAI direct (bypass LiteLLM, pas de budget tracking).
openclaw_model_profile: "eco"

openclaw_model_profiles:
  eco:
    default: "custom-litellm/deepseek-v3-free"
    code: "custom-litellm/qwen3-coder"
    reasoning: "custom-litellm/deepseek-r1-free"
    quick: "custom-litellm/deepseek-v3-free"
    default_fallbacks: '["custom-litellm/qwen3-coder", "openai/gpt-4o-mini"]'
    code_fallbacks: '["custom-litellm/deepseek-v3-free", "openai/gpt-4o-mini"]'
    reasoning_fallbacks: '["custom-litellm/deepseek-v3-free", "openai/gpt-4o-mini"]'
  balanced:
    default: "custom-litellm/glm-5"
    code: "custom-litellm/qwen3-coder"
    reasoning: "custom-litellm/deepseek-r1"
    quick: "custom-litellm/deepseek-v3"
    default_fallbacks: '["custom-litellm/deepseek-v3-free", "openai/gpt-4o-mini"]'
    code_fallbacks: '["custom-litellm/deepseek-v3-free", "openai/gpt-4o-mini"]'
    reasoning_fallbacks: '["custom-litellm/deepseek-v3-free", "openai/gpt-4o-mini"]'
  premium:
    default: "custom-litellm/claude-haiku"
    code: "custom-litellm/claude-sonnet"
    reasoning: "custom-litellm/claude-opus"
    quick: "custom-litellm/gpt-4o-mini"
    default_fallbacks: '["custom-litellm/glm-5", "custom-litellm/deepseek-v3-free"]'
    code_fallbacks: '["custom-litellm/qwen3-coder", "custom-litellm/deepseek-v3-free"]'
    reasoning_fallbacks: '["custom-litellm/deepseek-r1", "custom-litellm/deepseek-v3-free"]'
  # OpenAI OAuth (provider: openai-codex) — modèles OpenAI via OAuth ChatGPT Plus/Pro.
  # Endpoint: chatgpt.com/backend-api (pas api.openai.com) + api: openai-codex-responses.
  # Bypass LiteLLM. Coût inclus dans l'abonnement (pas de crédits API consommés).
  # Flow: make openclaw-oauth-start → navigateur → make openclaw-oauth-complete URL=<callback>
  openai:
    default: "openai-codex/gpt-5.4"
    code: "openai-codex/gpt-5.4"
    reasoning: "openai-codex/gpt-5.4"
    quick: "openai-codex/gpt-5.4"
    default_fallbacks: '["custom-litellm/claude-sonnet", "custom-litellm/gpt-4o"]'
    code_fallbacks: '["custom-litellm/claude-sonnet", "custom-litellm/gpt-4o"]'
    reasoning_fallbacks: '["custom-litellm/claude-sonnet", "custom-litellm/gpt-4o"]'

# Per-agent model assignments (resolved from active profile, overridable individually)
openclaw_concierge_model: "{{ openclaw_model_profiles[openclaw_model_profile].default }}"
openclaw_builder_model: "{{ openclaw_model_profiles[openclaw_model_profile].code }}"
openclaw_writer_model: "{{ openclaw_model_profiles[openclaw_model_profile].default }}"
openclaw_artist_model: "{{ openclaw_model_profiles[openclaw_model_profile].default }}"
openclaw_tutor_model: "{{ openclaw_model_profiles[openclaw_model_profile].default }}"
openclaw_explorer_model: "{{ openclaw_model_profiles[openclaw_model_profile].default }}"
openclaw_marketer_model: "{{ openclaw_model_profiles[openclaw_model_profile].default }}"
openclaw_cfo_model: "{{ openclaw_model_profiles[openclaw_model_profile].reasoning }}"
openclaw_maintainer_model: "{{ openclaw_model_profiles[openclaw_model_profile].code }}"
openclaw_code_model: "{{ openclaw_model_profiles[openclaw_model_profile].code }}"
openclaw_quick_model: "{{ openclaw_model_profiles[openclaw_model_profile].quick }}"
openclaw_cheap_model: "{{ openclaw_model_profiles[openclaw_model_profile].quick }}"
openclaw_messenger_model: "{{ openclaw_model_profiles[openclaw_model_profile].code }}"
# Director uses reasoning model — needs strategic thinking for production decisions
openclaw_director_model: "{{ openclaw_model_profiles[openclaw_model_profile].reasoning }}"

# --- Skills ---
# Centralized list of all OpenClaw skills (used in 3 task loops: dirs, deploy, cleanup)
openclaw_skills:
  - delegate-n8n
  - search-content
  - generate-visual
  - rate-response
  - budget-monitor
  - cost-analysis
  - infra-maintain
  - deploy-check
  - project-management
  - code-review
  - image-generation
  - video-composition
  - code-fix-github
  - finance-personal
  - idea-planning
  - palais-bridge
  - swarm-coordinator
  - content-director
  - studio-produce

# Skills supprimés — Ansible les supprime du répertoire global sur le VPS
# Ajouter ici les skills obsolètes pour nettoyage automatique
openclaw_skills_removed:
  - kaneo-bridge    # Remplacé par Plane (phase 2, 2026-03-02)
  - task-management # Skill orphelin Kaneo non géré par Ansible (phase 2, 2026-03-02)

# --- Boîte à Idées ---
# Cycle de vie des idées (Draft → Approved → Implemented)
openclaw_ideas_project_name: "Boîte à Idées"
# Collection Qdrant pour la mémoire sémantique des idées approuvées (1536 dims, Cosine)
openclaw_qdrant_ideas_collection: "ideas"

# --- n8n Integration ---
openclaw_n8n_integration: true
openclaw_n8n_workflows:
  - name: translate
    path: ai-translate
    description: "Traduire du contenu via LiteLLM (haiku)"
  - name: summarize
    path: ai-summarize
    description: "Resumer du contenu long via LiteLLM"
  - name: format-data
    path: ai-format
    description: "Formater des donnees structurees"
  - name: model-feedback
    path: ai-model-feedback
    description: "Envoyer un feedback like/dislike sur un modele"
  - name: model-scores
    path: ai-model-scores
    description: "Consulter le tableau de ponderation des modeles"
  - name: code-review
    path: code-review
    description: "Review automatique de code via SSH RPi + LiteLLM (criteres VPAI)"
  - name: error-to-task
    path: error-to-task
    description: "Creer une tache de correction a partir d'une erreur"
  - name: project-status
    path: project-status
    description: "Rapport d'avancement projet (temps passe, livrables, blocages)"

# --- Budget Control (commands Telegram → n8n webhook) ---
# Commandes reconnues par le concierge OpenClaw (via Telegram) :
#   /budget          → statut détaillé (spend 24h par provider)
#   /budget eco on   → activer mode éco (modèles gratuits forcés)
#   /budget eco off  → retour mode normal
# Ces commandes appellent le webhook n8n "budget-control"
openclaw_budget_webhook_url: "http://n8n:5678/webhook/budget-control"
openclaw_budget_commands:
  - trigger: "/budget eco on"
    action: "eco_on"
    description: "Activer mode économie (modèles gratuits)"
  - trigger: "/budget eco off"
    action: "eco_off"
    description: "Désactiver mode économie (retour normal)"
  - trigger: "/budget"
    action: "status"
    description: "Afficher le budget IA actuel"

# --- Telegram Bot (dedicated, distinct from monitoring bot) ---
# telegram_openclaw_bot_token is in main.yml (from vault)
# telegram_openclaw_chat_id is in main.yml (from vault)

# --- Telegram Topic Routing (v2026.3.7 — per-topic agent binding) ---
# Enable to route Telegram forum topics to specific agents (bypass concierge).
# Requires a Telegram supergroup with Forum Topics enabled.
# Set telegram_openclaw_group_id and topic IDs in main.yml after creating the group.
openclaw_telegram_topic_routing: false
# Topic IDs are assigned by Telegram when creating forum topics.
# After creating topics in the group, get IDs via Bot API getForumTopicEdited or logs.
# Map: topic_id → agent_id (from openclaw_agent_*_name variables)
openclaw_telegram_topics:
  general: { topic_id: "{{ telegram_openclaw_topic_ids.general | default('') }}", agent: "{{ openclaw_agent_concierge_name }}" }
  code: { topic_id: "{{ telegram_openclaw_topic_ids.code | default('') }}", agent: "{{ openclaw_agent_builder_name }}" }
  finance: { topic_id: "{{ telegram_openclaw_topic_ids.finance | default('') }}", agent: "{{ openclaw_agent_cfo_name }}" }
  ops: { topic_id: "{{ telegram_openclaw_topic_ids.ops | default('') }}", agent: "{{ openclaw_agent_maintainer_name }}" }
  recherche: { topic_id: "{{ telegram_openclaw_topic_ids.recherche | default('') }}", agent: "{{ openclaw_agent_explorer_name }}" }
  ecriture: { topic_id: "{{ telegram_openclaw_topic_ids.ecriture | default('') }}", agent: "{{ openclaw_agent_writer_name }}" }
  ecole: { topic_id: "{{ telegram_openclaw_topic_ids.ecole | default('') }}", agent: "{{ openclaw_agent_tutor_name }}" }
  contenu: { topic_id: "{{ telegram_openclaw_topic_ids.contenu | default('') }}", agent: "{{ openclaw_agent_marketer_name }}" }
  studio: { topic_id: "{{ telegram_openclaw_topic_ids.studio | default('') }}", agent: "{{ openclaw_agent_director_name }}" }

# --- WhatsApp (Tutor channel — child tablet) ---
# whatsapp_tutor_enabled and phone set in main.yml

# --- Heartbeat (v2026.3.7 native support — REX 11.19 resolved) ---
# DÉSACTIVÉ : le heartbeat consomme des tokens LLM via le concierge agent.
# Les checks infra sont assurés par n8n stack-health (localhost, 0 tokens).
# Réactiver si besoin : openclaw_heartbeat_enabled: true
openclaw_heartbeat_enabled: false
openclaw_heartbeat_light_context: true

# --- Plane Integration (OpenClaw → Plane API) ---
# Agent names for Plane API tokens (must match openclaw_agent_*_name variables)
plane_agent_names:
  - "{{ openclaw_agent_concierge_name }}"
  - "{{ openclaw_agent_builder_name }}"
  - "{{ openclaw_agent_writer_name }}"
  - "{{ openclaw_agent_artist_name }}"
  - "{{ openclaw_agent_tutor_name }}"
  - "{{ openclaw_agent_explorer_name }}"
  - "{{ openclaw_agent_marketer_name }}"
  - "{{ openclaw_agent_cfo_name }}"
  - "{{ openclaw_agent_maintainer_name }}"
  - "{{ openclaw_agent_messenger_name }}"
  - "{{ openclaw_agent_director_name }}"

plane_workspace_slug: "ewutelo"

# --- Swarm Mode (multi-agent collaboration) ---
# When enabled, agents can spawn each other directly (not just via concierge).
# The inter-agent graph defines who can call whom — controlled, not open-bar.
# Concierge remains the orchestrator but agents can collaborate laterally.
openclaw_swarm_enabled: true

# Max concurrent subagents per parent (raised from 4 for swarm tasks)
openclaw_swarm_max_concurrent: 6

# Archive idle subagent sessions after N minutes (frees memory)
openclaw_swarm_archive_minutes: 90

# Swarm coordination timeout (seconds) — fan-out tasks auto-cancel after this
openclaw_swarm_coordination_timeout: 600

# Inter-agent collaboration graph (who can spawn whom, beyond just messenger)
# Only listed pairs are authorized — keeps security boundary tight.
# Format: agent_id -> list of agents they can spawn (in addition to messenger)
openclaw_swarm_graph:
  builder:
    - "{{ openclaw_agent_explorer_name }}"     # Research before coding
    - "{{ openclaw_agent_maintainer_name }}"   # Check infra health post-deploy
  writer:
    - "{{ openclaw_agent_artist_name }}"       # Request illustrations for content
    - "{{ openclaw_agent_explorer_name }}"     # Research for articles
  artist:
    - "{{ openclaw_agent_explorer_name }}"     # Reference images/inspiration
  marketer:
    - "{{ openclaw_agent_writer_name }}"       # Content creation for campaigns
    - "{{ openclaw_agent_artist_name }}"       # Visuals for campaigns
    - "{{ openclaw_agent_explorer_name }}"     # Market research
  maintainer: []    # No lateral spawn — escalates to Concierge for fixes (prevents builder↔maintainer fork bomb cycle)
  director:
    - "{{ openclaw_agent_artist_name }}"       # Visual generation (storyboard, images)
    - "{{ openclaw_agent_writer_name }}"       # Script writing, prompt engineering
    - "{{ openclaw_agent_explorer_name }}"     # Reference research, style discovery
    - "{{ openclaw_agent_marketer_name }}"     # Publication, social media
    - "{{ openclaw_agent_cfo_name }}"          # Budget tracking for productions
  cfo:
    - "{{ openclaw_agent_explorer_name }}"     # Research pricing/providers

# --- Circuit Breaker & Model Failover ---
# When primary model fails (rate limit, auth, timeout), try fallbacks in order.
# Last fallback uses openai/ direct (bypasses LiteLLM) for maximum resilience.
openclaw_failover_enabled: true
openclaw_failover_retry_seconds: 900  # 15 min before retrying primary
openclaw_failover_triggers: '["rate_limit", "auth_cooldown", "provider_unavailable", "timeout"]'

# Fallback chains (resolved from active profile — each tier falls back differently)
# eco:     free → free alt → openai direct
# balanced: mid-tier → free → openai direct
# premium: premium → mid-tier → free
openclaw_default_fallbacks: "{{ openclaw_model_profiles[openclaw_model_profile].default_fallbacks }}"
openclaw_code_fallbacks: "{{ openclaw_model_profiles[openclaw_model_profile].code_fallbacks }}"
openclaw_reasoning_fallbacks: "{{ openclaw_model_profiles[openclaw_model_profile].reasoning_fallbacks }}"

# Agent timeout per turn (seconds) — aborts if exceeded
openclaw_agent_timeout: 300

# --- Tool Loop Detection ---
# Detects and stops stuck agents repeating the same tool calls.
# globalCircuitBreakerThreshold = hard stop (aborts agent turn).
openclaw_loop_detection_enabled: true
openclaw_loop_warning_threshold: 10
openclaw_loop_critical_threshold: 20
openclaw_loop_breaker_threshold: 30
openclaw_loop_history_size: 30

# --- Telegram Retry Policy ---
# Auto-reconnect on polling failures (without this, Telegram dies after ~8 min).
openclaw_telegram_retry_attempts: 5
openclaw_telegram_retry_min_delay: 1000
openclaw_telegram_retry_max_delay: 10000
openclaw_telegram_retry_jitter: 0.3
