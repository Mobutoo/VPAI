---
# remotion — handlers
# Shares the creative stack compose with ComfyUI

- name: Restart creative stack
  community.docker.docker_compose_v2:
    project_src: "/opt/workstation"
    files:
      - docker-compose-creative.yml
    state: restarted
  become: true
  when: not (common_molecule_mode | default(false))

- name: Build and restart remotion
  community.docker.docker_compose_v2:
    project_src: "/opt/workstation"
    files:
      - docker-compose-creative.yml
    services:
      - remotion
    build: always
    state: present
    recreate: always
  become: true
  when: not (common_molecule_mode | default(false))
