---
# comfyui — tasks
# ComfyUI Docker container on RPi 5 (ARM64, CPU-only)
# Docker already installed by workstation-common role

- name: Create ComfyUI install directory
  ansible.builtin.file:
    path: "{{ comfyui_install_dir }}"
    state: directory
    owner: "{{ workstation_pi_user }}"
    group: "{{ workstation_pi_user }}"
    mode: "0755"
  become: true

- name: Create ComfyUI data directories
  ansible.builtin.file:
    path: "{{ comfyui_data_dir }}/{{ item }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"
  become: true
  loop:
    - models
    - models/checkpoints
    - models/loras
    - models/vae
    - output
    - input
    - custom_nodes

- name: Create shared creative assets directory
  ansible.builtin.file:
    path: "{{ creative_assets_dir }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"
  become: true

- name: Copy ComfyUI Dockerfile
  ansible.builtin.copy:
    src: Dockerfile
    dest: "{{ comfyui_install_dir }}/Dockerfile"
    owner: "{{ workstation_pi_user }}"
    group: "{{ workstation_pi_user }}"
    mode: "0644"
  become: true
  register: comfyui_dockerfile

- name: Build ComfyUI Docker image (ARM64 CPU-only)
  community.docker.docker_image:
    name: "comfyui-local"
    tag: "{{ comfyui_version }}"
    source: build
    build:
      path: "{{ comfyui_install_dir }}"
      args:
        COMFYUI_VERSION: "{{ comfyui_version }}"
      platform: "linux/arm64"
    force_source: "{{ comfyui_dockerfile.changed }}"
  become: true

- name: Clone custom nodes # noqa: latest[git]
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "{{ comfyui_data_dir }}/custom_nodes/{{ item.name }}"
    depth: 1
    version: "HEAD"
    force: false
  become: true
  loop: "{{ comfyui_custom_nodes }}"
  loop_control:
    label: "{{ item.name }}"
  register: comfyui_custom_nodes_clone

- name: Set ownership on custom nodes
  ansible.builtin.file:
    path: "{{ comfyui_data_dir }}/custom_nodes/{{ item.name }}"
    state: directory
    owner: "1000"
    group: "1000"
    recurse: true
  become: true
  loop: "{{ comfyui_custom_nodes }}"
  loop_control:
    label: "{{ item.name }}"

- name: Patch comfy-api-liberation BytePlus URL (upstream fix pending)
  ansible.builtin.replace:
    path: "{{ comfyui_data_dir }}/custom_nodes/comfy-api-liberation/mappings/byteplus.py"
    regexp: 'api\.byteplus\.com'
    replace: 'ark.ap-southeast.bytepluses.com'
  become: true
  changed_when: false
  failed_when: false
  tags: [comfyui]

- name: Deploy creative studio Docker Compose
  ansible.builtin.template:
    src: docker-compose-creative.yml.j2
    dest: "/opt/workstation/docker-compose-creative.yml"
    owner: "{{ workstation_pi_user }}"
    group: "{{ workstation_pi_user }}"
    mode: "0644"
  become: true
  notify: Restart creative stack

- name: Start creative studio stack
  community.docker.docker_compose_v2:
    project_src: "/opt/workstation"
    files:
      - docker-compose-creative.yml
    state: present
  become: true

- name: Wait for ComfyUI port to be open
  ansible.builtin.wait_for:
    host: localhost
    port: "{{ comfyui_port }}"
    timeout: 120
    state: started
  changed_when: false

- name: Install custom node Python dependencies in container
  ansible.builtin.command:
    cmd: >
      docker exec -u root workstation_comfyui
      pip install --no-cache-dir {{ item.pip_deps | join(' ') }}
  become: true
  loop: "{{ comfyui_custom_nodes | selectattr('pip_deps', 'defined') | list }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: "'Successfully installed' in _comfyui_pip.stdout"
  failed_when: _comfyui_pip.rc != 0
  register: _comfyui_pip

- name: Restart ComfyUI to load custom nodes (if deps changed)
  ansible.builtin.command:
    cmd: docker restart workstation_comfyui
  become: true
  when: _comfyui_pip.results | selectattr('changed', 'true') | list | length > 0
  changed_when: true

- name: Wait for ComfyUI restart after custom node install
  ansible.builtin.wait_for:
    host: localhost
    port: "{{ comfyui_port }}"
    timeout: 120
    state: started
  changed_when: false
  when: _comfyui_pip.results | selectattr('changed', 'true') | list | length > 0

- name: Check ComfyUI system stats endpoint
  ansible.builtin.uri:
    url: "http://localhost:{{ comfyui_port }}/system_stats"
    method: GET
    status_code: [200]
  retries: 6
  delay: 10
  register: comfyui_health
  until: comfyui_health.status == 200
  changed_when: false
  failed_when: false

- name: Display ComfyUI health status
  ansible.builtin.debug:
    msg: "ComfyUI: {{ 'healthy' if comfyui_health.status == 200 else 'unhealthy (status: ' ~ comfyui_health.status ~ ')' }}"

# --- Concurrent Access: CLI + Git + Watcher ---

- name: Create user data directory for workflows
  ansible.builtin.file:
    path: "{{ comfyui_workflows_dir }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"
  become: true

- name: Create CLI install directory
  ansible.builtin.file:
    path: "{{ comfyui_cli_install_dir }}"
    state: directory
    owner: "{{ workstation_pi_user }}"
    group: "{{ workstation_pi_user }}"
    mode: "0755"
  become: true

- name: Copy CLI source code
  ansible.builtin.copy:
    src: comfyui-cli/
    dest: "{{ comfyui_cli_install_dir }}/"
    owner: "{{ workstation_pi_user }}"
    group: "{{ workstation_pi_user }}"
    mode: "0644"
  become: true
  register: _comfyui_cli_src

- name: Install CLI Python dependencies in venv
  ansible.builtin.pip:
    requirements: "{{ comfyui_cli_install_dir }}/requirements.txt"
    virtualenv: "{{ comfyui_cli_install_dir }}/.venv"
    virtualenv_command: "python3 -m venv"
  become: true
  become_user: "{{ workstation_pi_user }}"

- name: Install CLI package in venv (editable)
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      {{ comfyui_cli_install_dir }}/.venv/bin/pip install -e "{{ comfyui_cli_install_dir }}"
    executable: /bin/bash
  become: true
  become_user: "{{ workstation_pi_user }}"
  register: _comfyui_cli_pip
  changed_when: "'Successfully installed' in _comfyui_cli_pip.stdout"

- name: Create CLI symlink in /usr/local/bin
  ansible.builtin.file:
    src: "{{ comfyui_cli_install_dir }}/.venv/bin/comfyui-cli"
    dest: /usr/local/bin/comfyui-cli
    state: link
  become: true

- name: Deploy CLI config
  ansible.builtin.template:
    src: comfyui-cli.yaml.j2
    dest: "/home/{{ workstation_pi_user }}/.comfyui-cli.yaml"
    owner: "{{ workstation_pi_user }}"
    group: "{{ workstation_pi_user }}"
    mode: "0600"
  become: true

- name: Initialize git repo in workflows directory
  ansible.builtin.command:
    cmd: git init
    chdir: "{{ comfyui_workflows_dir }}"
    creates: "{{ comfyui_workflows_dir }}/.git"
  become: true
  become_user: "{{ workstation_pi_user }}"

- name: Create .gitignore in workflows repo
  ansible.builtin.copy:
    content: |
      *.tmp
      *.bak
      .DS_Store
      __pycache__/
      *.pyc
    dest: "{{ comfyui_workflows_dir }}/.gitignore"
    owner: "{{ workstation_pi_user }}"
    group: "{{ workstation_pi_user }}"
    mode: "0644"
  become: true

- name: Add Gitea remote to workflows repo
  ansible.builtin.command:
    cmd: git remote add origin {{ comfyui_git_remote }}
    chdir: "{{ comfyui_workflows_dir }}"
  become: true
  become_user: "{{ workstation_pi_user }}"
  changed_when: false
  failed_when: false

- name: Initial git commit in workflows repo
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      cd {{ comfyui_workflows_dir }}
      git add -A
      git diff --cached --quiet || git -c user.name="Ansible" -c user.email="ansible@localhost" commit -m "init: workflow repository"
      git push -u origin main 2>/dev/null || true
    executable: /bin/bash
  become: true
  become_user: "{{ workstation_pi_user }}"
  changed_when: false
  failed_when: false

- name: Install inotify-tools
  ansible.builtin.apt:
    name: inotify-tools
    state: present
  become: true

- name: Deploy watcher script
  ansible.builtin.template:
    src: comfyui-watcher.sh.j2
    dest: /opt/workstation/comfyui-watcher.sh
    owner: "{{ workstation_pi_user }}"
    group: "{{ workstation_pi_user }}"
    mode: "0755"
  become: true
  notify: Restart comfyui-watcher

- name: Deploy watcher systemd service
  ansible.builtin.template:
    src: comfyui-watcher.service.j2
    dest: /etc/systemd/system/comfyui-watcher.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart comfyui-watcher

- name: Enable and start watcher service
  ansible.builtin.systemd:
    name: comfyui-watcher
    enabled: true
    state: started
    daemon_reload: true
  become: true
  when: not (common_molecule_mode | default(false))

- name: Set up git push cron job
  ansible.builtin.cron:
    name: "comfyui-workflows-git-push"
    minute: "*/{{ comfyui_git_push_interval }}"
    job: "cd {{ comfyui_workflows_dir }} && git push --quiet origin main 2>/dev/null || git push --quiet -u origin main 2>/dev/null || true"
    user: "{{ workstation_pi_user }}"
  become: true

# --- MCP Server (comfyui-studio) ---

- name: Create MCP server directory
  ansible.builtin.file:
    path: "{{ comfyui_studio_install_dir }}"
    state: directory
    owner: "{{ workstation_pi_user }}"
    group: "{{ workstation_pi_user }}"
    mode: "0755"
  become: true

- name: Copy MCP server source
  ansible.builtin.copy:
    src: comfyui-studio/
    dest: "{{ comfyui_studio_install_dir }}/"
    owner: "{{ workstation_pi_user }}"
    group: "{{ workstation_pi_user }}"
    mode: "0644"
  become: true

- name: Install MCP server dependencies in CLI venv
  ansible.builtin.pip:
    requirements: "{{ comfyui_studio_install_dir }}/requirements.txt"
    virtualenv: "{{ comfyui_cli_install_dir }}/.venv"
  become: true
  become_user: "{{ workstation_pi_user }}"
