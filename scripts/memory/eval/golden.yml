# golden.yml — Golden-set d'évaluation retrieval mémoire (contrat RAG v3 2026-06-10)
#
# Chaque entrée : {query, expected_paths: [repo:relative_path...], doc_kind, note}.
# Match (run_eval.py) : AU MOINS UN expected_path présent dans le top-k
# (comparaison payload Qdrant `repo` + `relative_path`).
# Sources : docs/rex/, docs/runbooks/, docs/TROUBLESHOOTING.md, docs/guides/.
# Mix exact-match (variables Ansible, commandes, tags d'images, ports) et
# sémantique (symptômes d'incidents -> REX). FR/EN mélangés volontairement.
#
# Vérification d'existence : tous les chemins VPAI:<p> existent sous
# /home/mobuone/work/infra/VPAI/<p> (vérifié 2026-06-10).
#
# Extension 2026-07-18 (T0.1, plan ops/loops/plans/2026-07-17-scoped-retrieval-
# implementation.md) : section "CROSS-WING" ajoutée en fin de fichier. Chaque
# entrée y porte deux champs additionnels (ignorés par run_eval.py — non lus
# par evaluate()/aggregate(), donc zéro impact sur les 76 questions ci-dessus
# ni sur le parsing) :
#   - cross_wing: true   — marqueur explicite (mesure du downside du scoping).
#   - asked_from: "<wing>/<repo>" — d'où un agent poserait la question (CWD
#     simulé -> scope dérivé par T1.2), TOUJOURS différent du wing/repo réel
#     de expected_paths. Objectif : mesurer si un boost in-scope pénaliserait
#     une réponse hors-scope legitime (contrainte de conception #1 du plan —
#     boost jamais filtre dur).
# Toutes les réponses de cette section sont refdocs-only (wing refdocs, repos
# n8n-docs/litellm-docs/openclaw-docs/typebot-docs, ~26 602 pts) — vérifiées
# indexées via `client.count()` exact sur (repo, relative_path) le 2026-07-18
# (cf commit + sortie run T0.1). Aucun chemin VPAI/wiki dupliqué en expected_paths
# (évite un faux-négatif "cross-wing" si le même fait existe aussi côté VPAI).

