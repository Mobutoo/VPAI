---
- name: Verify common role
  hosts: all
  gather_facts: true
  vars:
    # Stub vars — verify.yml runs independently, does not inherit converge.yml vars
    project_name: molecule-test
    common_molecule_mode: true
  tasks:
    - name: Check common packages are installed
      ansible.builtin.command:
        cmd: "dpkg -l {{ item }}"
      loop:
        - curl
        - wget
        - jq
        - htop
      changed_when: false

    - name: Check project directory exists
      ansible.builtin.stat:
        path: "/opt/{{ project_name }}"
      register: project_dir
      failed_when: not project_dir.stat.exists

    - name: Check sysctl values (skipped in molecule — sysctl not applied in Docker)
      ansible.builtin.command:
        cmd: "sysctl -n vm.swappiness"
      register: swappiness
      changed_when: false
      failed_when: swappiness.stdout != "10"
      when: not (common_molecule_mode | default(false))
