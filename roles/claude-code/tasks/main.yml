---
# claude-code — tasks
# Installs Claude Code CLI globally via npm and configures MCP servers
# Pattern: same as opencode (npm global, community.general.npm)

# --- Config directory ---
- name: Create Claude Code config directory
  ansible.builtin.file:
    path: "{{ claude_code_config_dir }}"
    state: directory
    owner: "{{ claude_code_user }}"
    group: "{{ claude_code_user }}"
    mode: "0700"
  become: true

# --- Workspace directories ---
- name: Create Claude Code workspace directories
  ansible.builtin.file:
    path: "/home/{{ claude_code_user }}/{{ item }}"
    state: directory
    owner: "{{ claude_code_user }}"
    group: "{{ claude_code_user }}"
    mode: "0755"
  become: true
  loop: "{{ claude_code_workspace_dirs }}"

# --- Install Claude Code CLI via npm global ---
- name: Install Claude Code CLI via npm global
  community.general.npm:
    name: "@anthropic-ai/claude-code"
    version: "{{ claude_code_npm_version }}"
    global: true
    state: present
  become: true

- name: Verify Claude Code installation
  ansible.builtin.command:
    cmd: "{{ claude_code_npm_prefix }}/bin/claude --version"
  changed_when: false
  register: claude_code_version
  failed_when: claude_code_version.rc != 0

- name: Display Claude Code version
  ansible.builtin.debug:
    msg: "Claude Code: {{ claude_code_version.stdout }}"

# --- Deploy CLAUDE.md project memory ---
- name: Deploy CLAUDE.md for workstation context
  ansible.builtin.template:
    src: CLAUDE.md.j2
    dest: "{{ claude_code_config_dir }}/CLAUDE.md"
    owner: "{{ claude_code_user }}"
    group: "{{ claude_code_user }}"
    mode: "0644"
  become: true

# --- Deploy MCP configuration ---
- name: Deploy MCP servers configuration (mcp.json)
  ansible.builtin.template:
    src: mcp.json.j2
    dest: "{{ claude_code_config_dir }}/mcp.json"
    owner: "{{ claude_code_user }}"
    group: "{{ claude_code_user }}"
    mode: "0600"
  become: true

# --- GSD hooks directory ---
- name: Create Claude Code hooks directory
  ansible.builtin.file:
    path: "{{ claude_code_config_dir }}/hooks"
    state: directory
    owner: "{{ claude_code_user }}"
    group: "{{ claude_code_user }}"
    mode: "0700"
  become: true

# --- Deploy context management hooks ---
- name: Deploy GSD auto-compact hook script
  ansible.builtin.template:
    src: auto-compact.sh.j2
    dest: "{{ claude_code_config_dir }}/hooks/auto-compact.sh"
    owner: "{{ claude_code_user }}"
    group: "{{ claude_code_user }}"
    mode: "0755"
  become: true
  when: claude_code_gsd_auto_compact_enabled | default(false)

- name: Deploy pre-compact state preservation hook
  ansible.builtin.template:
    src: pre-compact-save.sh.j2
    dest: "{{ claude_code_config_dir }}/hooks/pre-compact-save.sh"
    owner: "{{ claude_code_user }}"
    group: "{{ claude_code_user }}"
    mode: "0755"
  become: true

- name: Deploy post-compact context restoration hook
  ansible.builtin.template:
    src: post-compact-restore.sh.j2
    dest: "{{ claude_code_config_dir }}/hooks/post-compact-restore.sh"
    owner: "{{ claude_code_user }}"
    group: "{{ claude_code_user }}"
    mode: "0755"
  become: true

- name: Deploy stop-gate hook (blocks exit without state save)
  ansible.builtin.template:
    src: stop-gate.sh.j2
    dest: "{{ claude_code_config_dir }}/hooks/stop-gate.sh"
    owner: "{{ claude_code_user }}"
    group: "{{ claude_code_user }}"
    mode: "0755"
  become: true

# --- Deploy Claude Code settings (hooks registered here) ---
- name: Deploy Claude Code settings (settings.json)
  ansible.builtin.template:
    src: settings.json.j2
    dest: "{{ claude_code_config_dir }}/settings.json"
    owner: "{{ claude_code_user }}"
    group: "{{ claude_code_user }}"
    mode: "0600"
  become: true

# --- Install get-shit-done (GSD) — meta-prompting system for Claude Code ---
- name: Install get-shit-done-cc (GSD meta-prompting system)
  community.general.npm:
    name: "get-shit-done-cc"
    version: "{{ claude_code_gsd_npm_version }}"
    global: true
    state: present
  become: true
  when: claude_code_gsd_enabled | default(true)

- name: Run get-shit-done-cc installer (sets up GSD in home dir)
  ansible.builtin.command:
    cmd: "{{ claude_code_npm_prefix }}/bin/get-shit-done-cc"
    chdir: "/home/{{ claude_code_user }}"
  become: true
  become_user: "{{ claude_code_user }}"
  register: gsd_install_result
  changed_when: "'installed' in gsd_install_result.stdout | lower or 'created' in gsd_install_result.stdout | lower"
  failed_when: false
  when: claude_code_gsd_enabled | default(true)

# --- GSD YOLO mode: autonomous operation without human interaction ---
- name: Create GSD default config directory for YOLO mode
  ansible.builtin.file:
    path: "/home/{{ claude_code_user }}/.gsd"
    state: directory
    owner: "{{ claude_code_user }}"
    group: "{{ claude_code_user }}"
    mode: "0755"
  become: true
  when:
    - claude_code_gsd_enabled | default(true)
    - claude_code_gsd_yolo_mode | default(false)

- name: Deploy GSD default config (YOLO mode + model routing)
  ansible.builtin.template:
    src: gsd-defaults.json.j2
    dest: "/home/{{ claude_code_user }}/.gsd/defaults.json"
    owner: "{{ claude_code_user }}"
    group: "{{ claude_code_user }}"
    mode: "0644"
  become: true
  when:
    - claude_code_gsd_enabled | default(true)
    - claude_code_gsd_yolo_mode | default(false)

# --- Install MCP server packages ---
- name: Install Context7 MCP server via npm global
  community.general.npm:
    name: "@upstash/context7-mcp"
    global: true
    state: present
  become: true
  when: claude_code_mcp_context7_enabled | default(false)

- name: Install Filesystem MCP server via npm global
  community.general.npm:
    name: "@modelcontextprotocol/server-filesystem"
    global: true
    state: present
  become: true
  when: claude_code_mcp_filesystem_enabled | default(false)

# --- Firefly III MCP server (Python, via uvx) ---
- name: Ensure pipx/uvx is available for Python MCP servers
  ansible.builtin.apt:
    name: pipx
    state: present
  become: true
  when: claude_code_mcp_firefly_enabled | default(false)

- name: Ensure uvx is accessible via pipx ensurepath
  ansible.builtin.command:
    cmd: pipx ensurepath
  become: true
  become_user: "{{ claude_code_user }}"
  changed_when: false
  when: claude_code_mcp_firefly_enabled | default(false)

# --- Playwright MCP — headless browser for visual testing ---
- name: Install Playwright system dependencies
  ansible.builtin.command:
    cmd: npx playwright install-deps
  become: true
  changed_when: false
  when: claude_code_mcp_playwright_enabled | default(false)

- name: Install Playwright Chromium (ARM64)
  ansible.builtin.command:
    cmd: npx playwright install chromium
  become: true
  become_user: "{{ claude_code_user }}"
  changed_when: false
  when: claude_code_mcp_playwright_enabled | default(false)

# --- Autonomous loop script ---
- name: Create scripts directory for Claude autonomous tools
  ansible.builtin.file:
    path: "/home/{{ claude_code_user }}/scripts"
    state: directory
    owner: "{{ claude_code_user }}"
    group: "{{ claude_code_user }}"
    mode: "0755"
  become: true

- name: Deploy claude-auto autonomous loop script
  ansible.builtin.template:
    src: claude-auto.sh.j2
    dest: "/home/{{ claude_code_user }}/scripts/claude-auto.sh"
    owner: "{{ claude_code_user }}"
    group: "{{ claude_code_user }}"
    mode: "0755"
  become: true

# --- Auto-fix pipeline ---
- name: Create autofix workspace directory
  ansible.builtin.file:
    path: "{{ claude_code_auto_fix_workspace }}"
    state: directory
    owner: "{{ claude_code_user }}"
    group: "{{ claude_code_user }}"
    mode: "0755"
  become: true
  when: claude_code_auto_fix_enabled | default(false)

- name: Deploy autofix script
  ansible.builtin.template:
    src: autofix.sh.j2
    dest: "/usr/local/bin/claude-autofix"
    owner: root
    group: root
    mode: "0755"
  become: true
  when: claude_code_auto_fix_enabled | default(false)

# --- Healthcheck ---
- name: Check Claude Code binary is accessible
  ansible.builtin.stat:
    path: "{{ claude_code_npm_prefix }}/bin/claude"
  register: claude_code_bin
  failed_when: not claude_code_bin.stat.exists
  changed_when: false
