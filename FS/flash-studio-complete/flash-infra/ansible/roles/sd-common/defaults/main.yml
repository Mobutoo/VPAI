---
# sd-common — defaults

sd_system_user: flash
sd_timezone: Europe/Paris
sd_hostname: service-desk

sd_common_packages:
  - curl
  - wget
  - jq
  - gnupg
  - ca-certificates
  - python3-pip
  - unzip
  - htop
  - ncdu
  - tmux
  - lsb-release
  - net-tools
  - rsync
  - ufw
  - fail2ban

sd_sysctl_settings:
  vm.swappiness: "10"
  vm.max_map_count: "262144"
  net.core.somaxconn: "65535"
  fs.file-max: "100000"

sd_ufw_allowed_ports:
  - "22"
  - "80"
  - "443"
