---
# videoref-engine — defaults
# Video reference analysis pipeline: keyframe extraction, optical flow, color analysis
# Generates ComfyUI workflow JSON from templates
# Deployed as Docker container on Workstation Pi (ARM64)

videoref_install_dir: "/opt/workstation/videoref-engine"
videoref_data_dir: "/opt/workstation/data/videoref-engine"

# Version (local build tag)
videoref_version: "v0.2.0"

# Ports
videoref_port: 8082

# Docker resource limits (RPi 5 16GB — heavy during ffmpeg/opencv processing)
videoref_memory_limit: "1536M"
videoref_memory_reservation: "512M"
videoref_cpu_limit: "2.0"

# Subdomain (VPN-only via workstation Caddy)
videoref_subdomain: "cine"

# Shared paths (exchange with MeTube + ComfyUI)
videoref_watch_dir: "{{ metube_download_dir }}"
videoref_output_dir: "/opt/workstation/data/videoref-engine/analyzed"
videoref_comfyui_workflows_dir: "/opt/workstation/data/comfyui/input"

# LiteLLM endpoint (Claude Vision via mesh VPN)
videoref_litellm_url: "http://{{ vps_tailscale_ip }}:4000"
videoref_litellm_key: "{{ litellm_master_key }}"

# Gitea template registry (via mesh VPN — Seko-VPN)
videoref_gitea_url: "{{ vault_videoref_gitea_url | default('') }}"
videoref_gitea_token: "{{ vault_videoref_gitea_token | default('') }}"
