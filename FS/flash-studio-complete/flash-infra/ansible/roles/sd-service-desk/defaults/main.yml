---
# sd-service-desk — defaults

sd_project_name: service-desk
sd_domain: jemeforme.ai
sd_deploy_dir: "/opt/{{ sd_project_name }}"

# --- Service versions (pinned, NO latest) ---
sd_postgres_version: "pg16"
sd_redis_version: "7.4.8-alpine"
sd_elasticsearch_version: "8.19.12"
sd_zammad_version: "7.0.0-9"
sd_discourse_version: "3.5.0-debian-12-r0"
sd_caddy_version: "2.11.2"
sd_qdrant_version: "v1.17.0"
sd_typesense_version: "30.1"
sd_gatus_version: "v5.35.0"
sd_memcached_version: "1.6.41-alpine"

# --- Secrets (override via extra-vars or SOPS) ---
sd_postgres_admin_password: "CHANGE_ME"
sd_zammad_db_user: zammad
sd_zammad_db_password: "CHANGE_ME"
sd_zammad_db_name: zammad_production
sd_discourse_db_user: discourse
sd_discourse_db_password: "CHANGE_ME"
sd_discourse_db_name: discourse
sd_servicedesk_db_user: servicedesk
sd_servicedesk_db_password: "CHANGE_ME"
sd_servicedesk_db_name: servicedesk
sd_discourse_admin_user: admin
sd_discourse_admin_password: "CHANGE_ME"
sd_discourse_admin_email: "infra@{{ sd_domain }}"
sd_qdrant_api_key: "CHANGE_ME"
sd_typesense_api_key: "CHANGE_ME"
sd_telegram_bot_token: ""
sd_telegram_chat_id: ""
sd_litellm_url: "http://litellm:4000"
sd_litellm_api_key: ""
sd_nextauth_secret: "CHANGE_ME"
# --- SMTP ---
sd_smtp_host: smtp-relay.brevo.com
sd_smtp_port: "587"
sd_smtp_user: "noreply@{{ sd_domain }}"
sd_smtp_password: "placeholder-configure-brevo"
sd_brevo_api_key: "placeholder-configure-brevo"

# --- Ports (host-side, bound to 127.0.0.1) ---
sd_zammad_port: "8080"
sd_discourse_port: "4000"
sd_qdrant_port: "6333"
sd_typesense_port: "8108"
sd_reranker_port: "8090"
sd_support_agent_port: "8091"
sd_gatus_port: "8082"
sd_portail_port: "3000"
sd_event_router_port: "8092"
