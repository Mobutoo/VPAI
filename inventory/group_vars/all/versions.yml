---
# inventory/group_vars/all/versions.yml — Images Docker pinnées
# JAMAIS de :latest ou :stable — Tout est versionné
# Vérifié le : 11 février 2026

# --- Données ---
postgresql_image: "postgres:18.1-bookworm"
redis_image: "redis:8.0-bookworm"  # 8.0.10 n'existe pas, utiliser 8.0
qdrant_image: "qdrant/qdrant:v1.16.3"

# --- Applications ---
openclaw_image: "ghcr.io/openclaw/openclaw:2026.3.13-1"
# n8n: image custom avec patch enterprise (roles/n8n/files/Dockerfile)
# Build: cd roles/n8n/files && docker build --build-arg N8N_VERSION=2.7.3 -t ghcr.io/mobutoo/n8n-enterprise:2.7.3 .
# Push:  docker push ghcr.io/mobutoo/n8n-enterprise:2.7.3
n8n_image: "ghcr.io/mobutoo/n8n-enterprise:2.7.3"
n8n_upstream_version: "2.7.3"  # version officielle n8nio/n8n sous-jacente
litellm_image: "ghcr.io/berriai/litellm:v1.81.3-stable"
nocodb_image: "nocodb/nocodb:0.301.2"
kitsu_image: "cgwire/cgwire:1.0.17"
plane_web_image: "makeplane/plane-frontend:v1.2.2"
plane_admin_image: "makeplane/plane-admin:v1.2.2"
plane_api_image: "makeplane/plane-backend:v1.2.2"
plane_worker_image: "makeplane/plane-backend:v1.2.2"
plane_minio_image: "minio/minio:RELEASE.2024-11-07T00-52-20Z"

# --- Reverse Proxy ---
caddy_image: "caddy:2.10.2-alpine"

# --- Observabilité ---
grafana_image: "grafana/grafana:12.3.2"
victoriametrics_image: "victoriametrics/victoria-metrics:v1.135.0"
loki_image: "grafana/loki:3.6.5"
alloy_image: "grafana/alloy:v1.13.0"

# --- Monitoring (collecteurs) ---
cadvisor_image: "ghcr.io/google/cadvisor:0.55.1"

# --- Système ---
diun_image: "crazymax/diun:4.31.0"
socket_proxy_image: "tecnativa/docker-socket-proxy:v0.4.2"

# --- Obsidian Sync ---
couchdb_image: "apache/couchdb:3.3.3"

# --- Kitsu (animation/VFX production tracker) ---
kitsu_image: "cgwire/cgwire:1.0.17"

# --- Tunnel / VPN-only ---
# cloudflared: RETIRÉ — remplacé par webhook relay via Seko-VPN (role webhook-relay)
# Les webhooks Meta passent maintenant par hook.<domain> (Seko-VPN) -> VPN mesh -> VPS
# cloudflared_image: "cloudflare/cloudflared:2025.1.0"

# --- Firefly III (personal finance engine) ---
firefly_image: "fireflyiii/core:version-6.5.3"

# --- Zimboo Dashboard (Next.js financial cockpit) ---
zimboo_image: "ghcr.io/mobutoo/zimboo:v1.14.0"

# --- Food & Stock (Koodia) ---
mealie_image: "ghcr.io/mealie-recipes/mealie:v3.12.0"
grocy_image: "lscr.io/linuxserver/grocy:4.6.0"
koodia_image: "ghcr.io/mobutoo/koodia:v0.1.0"

# --- MeTube (video downloader — Workstation Pi) ---
metube_image: "alexta69/metube:2026.03.14"

# --- VideoRef Engine (video analysis pipeline — Workstation Pi) ---
videoref_image: "ghcr.io/mobutoo/videoref-engine:v0.1.0"

# --- Workstation Pi (natif — pas Docker) ---
# Caddy : binaire custom build via xcaddy (module dns.providers.ovh)
# Version alignee avec le prod Docker (caddy_image ci-dessus)
workstation_caddy_image: "caddy:2.10.2-alpine"  # reference version prod
# OpenCode : pinne apres premier deploy valide
# opencode_npm_version dans roles/opencode/defaults/main.yml
opencode_npm_version_pinned: "1.2.15"  # updated 2026-02-27

# Claude Code CLI : pinne apres premier deploy valide
# claude_code_npm_version dans roles/claude-code/defaults/main.yml
claude_code_npm_version_pinned: "2.1.62"  # updated 2026-02-27

# Codex CLI (OpenAI) : pinne apres premier deploy valide
# codex_cli_npm_version dans roles/codex-cli/defaults/main.yml
codex_cli_npm_version_pinned: "0.106.0"  # pinned 2026-02-27

# Gemini CLI (Google) : pinne apres premier deploy valide
# gemini_cli_npm_version dans roles/gemini-cli/defaults/main.yml
gemini_cli_npm_version_pinned: "0.30.0"  # updated 2026-02-27

# --- Design Tools (natif — pas Docker) ---
# OpenPencil : AI-native design editor, Figma alternative
# Version = git tag/branch, pin après premier deploy valide
