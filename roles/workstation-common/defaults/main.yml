---
# workstation-common — defaults

# Paquets de base pour le workstation Pi (Ubuntu Server 24.04 ARM64)
workstation_packages:
  - curl
  - wget
  - jq
  - gnupg
  - ca-certificates
  - python3-pip
  - unzip
  - htop
  - ncdu
  - tmux
  - lsb-release
  - net-tools
  - rsync
  - git
  - build-essential
  - apt-transport-https

workstation_hostname: "{{ workstation_pi_hostname | default('workstation-pi') }}"
workstation_user: "{{ workstation_pi_user | default('pi') }}"
workstation_locale: "{{ locale }}"
workstation_timezone: "{{ timezone }}"

# Docker config Pi (ARM64 — pas de swap limit kernel flag)
workstation_docker_log_max_size: "10m"
workstation_docker_log_max_file: "3"

# Node.js version (NodeSource LTS)
workstation_nodejs_major: "22"

# Claude Code CLI — pinne apres premier deploy valide (2026-02-20)
# Auth OAuth Max Plan : manuelle une seule fois (claude auth sur le Pi)
workstation_claude_code_version: "2.1.49"

# Repertoire projets (SSD 256 Go)
workstation_projects_dir: "/home/{{ workstation_pi_user | default('pi') }}/projects"
workstation_base_dir: "/opt/workstation"

# Sous-repertoires de /opt/workstation
workstation_base_dirs:
  - configs
  - configs/caddy
  - data
  - data/caddy
  - logs

# --- Asset Storage (Phase 13) ---
# Structure locale S3-like pour les assets générés (images, vidéos, audio)
workstation_assets_base: "/opt/workstation/data/assets"
workstation_assets_dirs:
  - images
  - images/comfyui
  - images/seedream
  - images/dalle
  - videos
  - videos/remotion
  - videos/seedance
  - videos/veo
  - audio
  - metadata

# sysctl adapte Pi (pas de swappiness agressif, ARM64)
workstation_sysctl_settings:
  vm.swappiness: 10
  fs.file-max: 100000

# NTP
workstation_ntp_servers:
  - "0.pool.ntp.org"
  - "1.pool.ntp.org"

# UFW — autoriser Tailscale CIDR + LAN seulement
workstation_ufw_allow_cidrs:
  - "{{ vpn_network_cidr }}"    # Tailscale mesh (100.64.0.0/10)
  - "192.168.0.0/16"            # LAN local
  - "10.0.0.0/8"                # LAN alternatif (sous-reseaux prives)

# --- Résilience réseau (REX 2026-06-05 panne SSH waza) ---
# Cause: worker mémoire non-borné -> OOM global -> systemd-networkd affamé ->
# bail DHCP eth0 perdu (RTM_DELROUTE gw) -> jamais re-DISCOVER -> tailscale
# ENETUNREACH -> SSH (mesh) mort ~6h30. Box/WAN sains (ewutelo resté en ligne).
# Réf: docs/rex/REX-SESSION-2026-06-05-waza-ssh-dhcp-oom.md
#
# P1 — protéger le stack réseau de l'OOM-killer (jamais 1ère victime).
workstation_net_protect_oom: true
workstation_net_oom_score: -900            # plage [-1000,1000]; bas = épargné
workstation_net_protected_units:
  - systemd-networkd
  - tailscaled
#
# P3 — watchdog passerelle: si la default route/gateway tombe durablement,
# relance DHCP (networkctl reconfigure) puis tailscaled. Auto-réparation headless.
workstation_net_watchdog_enabled: true
workstation_net_watchdog_iface: "eth0"
workstation_net_watchdog_ping_count: 3
workstation_net_watchdog_ping_timeout: 3   # secondes par ping
workstation_net_watchdog_fallback_target: "1.1.1.1"   # 2e cible pour confirmer la panne
workstation_net_watchdog_interval: "2min"  # OnUnitActiveSec du timer
workstation_net_watchdog_bin: "/opt/workstation/bin/net-watchdog.sh"
# Escalade reboot si la recovery réseau échoue durablement (headless 10j).
# Guardé: reboot SEULEMENT après N échecs consécutifs + cooldown anti-boucle.
workstation_net_watchdog_reboot_on_fail: true
workstation_net_watchdog_fail_threshold: 15        # échecs consécutifs avant reboot (15 × interval 2min ≈ 30min)
workstation_net_watchdog_reboot_cooldown: 3600     # secondes mini entre 2 reboots watchdog (anti boot-loop)

# --- Watchdog matériel (freeze / kernel hang headless) ---
# RPi5 expose /dev/watchdog (RP1). systemd le "pet" tant qu'il est vivant ;
# si PID1 gèle plus de RuntimeWatchdogSec, le SoC reboote tout seul.
# Couvre le cas "freeze total" qu'aucun watchdog logiciel ne peut traiter.
workstation_hw_watchdog_enabled: true
workstation_hw_watchdog_runtime_sec: "15s"         # délai sans "pet" avant reboot matériel
workstation_hw_watchdog_reboot_sec: "10min"        # délai max d'un shutdown/reboot avant kill matériel

# --- Intégrité FS après coupure de courant brutale ---
# fsck.repair=yes : répare automatiquement l'ext4 au boot si le FS est sale
# (coupure secteur) au lieu de tomber en prompt manuel -> évite un Pi bloqué.
workstation_fsck_repair_enabled: true
workstation_cmdline_path: "/boot/firmware/cmdline.txt"
