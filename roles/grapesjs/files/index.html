<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GrapeJS — Éditeur MOP</title>
  <link rel="stylesheet" href="/assets/grapesjs/css/grapes.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Toolbar ─────────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: #0f0f23;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
      min-height: 44px;
    }
    #toolbar-title {
      font-size: 13px;
      font-weight: 600;
      color: #9b9bc8;
      margin-right: 4px;
      white-space: nowrap;
    }
    .toolbar-sep { width: 1px; height: 22px; background: #2a2a4a; margin: 0 4px; }

    button {
      padding: 5px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    button:hover { opacity: 0.85; }
    #btn-import { background: #4a7eff; color: #fff; }
    #btn-docx   { background: #e67e22; color: #fff; }
    #btn-export { background: #27ae60; color: #fff; }
    #btn-copy   { background: #8e44ad; color: #fff; }
    #btn-clear  { background: #c0392b; color: #fff; }
    #btn-undo   { background: #2c3e50; color: #ccc; }
    #btn-redo   { background: #2c3e50; color: #ccc; }

    /* ── SSE status dot ──────────────────────────────────── */
    #sse-status {
      margin-left: auto;
      font-size: 11px;
      color: #666;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    #sse-dot { font-size: 10px; color: #555; transition: color 0.3s; }

    /* ── Editor wrapper ───────────────────────────────── */
    #editor-wrap {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    #gjs {
      flex: 1;
      height: 100%;
    }

    /* ── Modals ───────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1e1e3a;
      border: 1px solid #2a2a5a;
      border-radius: 8px;
      padding: 20px;
      width: 82vw;
      max-width: 960px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h2 { font-size: 14px; color: #c8c8e8; font-weight: 600; }
    .modal-hint { font-size: 11px; color: #666; }
    .modal textarea {
      flex: 1;
      min-height: 360px;
      background: #12121f;
      border: 1px solid #333355;
      border-radius: 4px;
      color: #b8c8d8;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      line-height: 1.5;
      padding: 12px;
      resize: vertical;
      outline: none;
    }
    .modal textarea:focus { border-color: #4a7eff; }
    .modal-footer {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .btn-cancel { background: #2c2c4a; color: #aaa; }
    .btn-ok     { background: #4a7eff; color: #fff; }
    .btn-ok-g   { background: #27ae60; color: #fff; }
    .btn-purple { background: #8e44ad; color: #fff; }

    /* ── Toast notification ───────────────────────────── */
    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #27ae60;
      color: #fff;
      padding: 9px 18px;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 500;
      display: none;
      z-index: 10000;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    #toast.error { background: #c0392b; }
  </style>
</head>
<body>

<!-- ── Toolbar ─────────────────────────────────────────── -->
<div id="toolbar">
  <span id="toolbar-title">GrapeJS — Éditeur MOP</span>
  <div class="toolbar-sep"></div>
  <button id="btn-import">⬆ Importer HTML</button>
  <button id="btn-docx">📄 Importer DOCX</button>
  <input type="file" id="input-docx" accept=".docx" style="display:none">
  <button id="btn-export">⬇ Exporter HTML</button>
  <button id="btn-copy">📋 Copier</button>
  <div class="toolbar-sep"></div>
  <button id="btn-undo">↩ Undo</button>
  <button id="btn-redo">↪ Redo</button>
  <div class="toolbar-sep"></div>
  <button id="btn-clear">✕ Vider</button>
  <span id="sse-status"><span id="sse-dot">●</span> API</span>
</div>

<!-- ── Editor ──────────────────────────────────────────── -->
<div id="editor-wrap">
  <div id="gjs"></div>
</div>

<!-- ── Modal: Import ───────────────────────────────────── -->
<div class="modal-overlay" id="modal-import">
  <div class="modal">
    <div class="modal-header">
      <h2>Importer HTML</h2>
      <span class="modal-hint">Collez votre template complet (&lt;!DOCTYPE html&gt;…) ou juste le contenu &lt;body&gt;</span>
    </div>
    <textarea id="import-ta" placeholder="&lt;!DOCTYPE html&gt;&#10;&lt;html&gt;...&lt;/html&gt;"></textarea>
    <div class="modal-footer">
      <button class="btn-cancel" id="btn-import-cancel">Annuler</button>
      <button class="btn-ok" id="btn-import-ok">Charger dans l'éditeur</button>
    </div>
  </div>
</div>

<!-- ── Modal: Export ───────────────────────────────────── -->
<div class="modal-overlay" id="modal-export">
  <div class="modal">
    <div class="modal-header">
      <h2>HTML exporté</h2>
      <span class="modal-hint">HTML complet prêt à coller ou à envoyer</span>
    </div>
    <textarea id="export-ta" readonly></textarea>
    <div class="modal-footer">
      <button class="btn-cancel" id="btn-export-close">Fermer</button>
      <button class="btn-purple" id="btn-export-copy">📋 Copier</button>
    </div>
  </div>
</div>

<!-- ── Toast ───────────────────────────────────────────── -->
<div id="toast"></div>

<script src="/assets/grapesjs/grapes.min.js"></script>
<script>
  /* ── Blocks MOP (tableaux, titres, listes — usage NOC/procédure) ── */
  const MOP_BLOCKS = [
    /* ── MOP ── */
    {
      id: 'mop-h1', label: 'Titre H1', category: 'MOP',
      content: '<h1 style="font-size:22px;font-weight:700;margin-bottom:12px">Titre principal</h1>'
    },
    {
      id: 'mop-h2', label: 'Titre H2', category: 'MOP',
      content: '<h2 style="font-size:17px;font-weight:600;margin-bottom:8px;color:#1a5276">Sous-titre</h2>'
    },
    {
      id: 'mop-h3', label: 'Titre H3', category: 'MOP',
      content: '<h3 style="font-size:14px;font-weight:600;margin-bottom:6px;color:#1a5276;border-bottom:1px solid #d5d8dc;padding-bottom:4px">Titre section</h3>'
    },
    {
      id: 'mop-p', label: 'Paragraphe', category: 'MOP',
      content: '<p style="margin-bottom:10px;line-height:1.6">Contenu du paragraphe.</p>'
    },
    {
      id: 'mop-page-break', label: 'Saut de page', category: 'MOP',
      content: '<div class="wizy-page-break" style="page-break-after:always;border-top:2px dashed #bbb;margin:24px 0 16px;padding-bottom:8px;text-align:center"><span style="font-size:10px;color:#aaa;font-style:italic">— Saut de page —</span></div>'
    },
    {
      id: 'mop-prereq', label: 'Prérequis', category: 'MOP',
      content: `<div style="background:#f4f6f7;border:1px solid #d5d8dc;border-radius:4px;padding:12px 16px;margin-bottom:12px">
        <strong style="font-size:13px;display:block;margin-bottom:8px">📋 Prérequis</strong>
        <p style="margin:0 0 4px;font-size:13px">☐ Accès VPN actif et connecté</p>
        <p style="margin:0 0 4px;font-size:13px">☐ Droits administrateur vérifiés</p>
        <p style="margin:0;font-size:13px">☐ Sauvegarde effectuée</p>
      </div>`
    },
    {
      id: 'mop-code', label: 'Bloc code/commande', category: 'MOP',
      content: `<pre style="background:#1e2228;color:#abb2bf;font-family:'SF Mono','Fira Code',monospace;font-size:12px;line-height:1.6;padding:12px 16px;border-radius:4px;overflow-x:auto;margin-bottom:12px"># Commande ici
sudo systemctl restart service-name</pre>`
    },
    {
      id: 'mop-checklist', label: 'Checklist', category: 'MOP',
      content: `<div style="margin-bottom:12px">
        <p style="margin:0 0 6px;font-size:13px"><strong>Checklist de vérification</strong></p>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:4px"><input type="checkbox"> Élément 1</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:4px"><input type="checkbox"> Élément 2</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px"><input type="checkbox"> Élément 3</label>
      </div>`
    },
    {
      id: 'mop-badge', label: 'Badge statut', category: 'MOP',
      content: `<div style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap">
        <span style="display:inline-block;background:#f39c12;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:3px;letter-spacing:0.5px">BROUILLON</span>
        <span style="display:inline-block;background:#27ae60;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:3px;letter-spacing:0.5px">EN VIGUEUR</span>
        <span style="display:inline-block;background:#7f8c8d;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:3px;letter-spacing:0.5px">OBSOLÈTE</span>
      </div>`
    },
    {
      id: 'mop-warning', label: 'Avertissement', category: 'MOP',
      content: `<div style="background:#fef9e7;border-left:4px solid #f1c40f;
        padding:10px 14px;margin-bottom:12px;font-size:13px">
        <strong>⚠ Avertissement</strong><br>Texte de mise en garde ici.
      </div>`
    },
    {
      id: 'mop-danger', label: 'Danger / STOP', category: 'MOP',
      content: `<div style="background:#fdedec;border-left:4px solid #e74c3c;
        padding:10px 14px;margin-bottom:12px;font-size:13px">
        <strong>🛑 STOP — Action critique</strong><br>Texte critique ici.
      </div>`
    },
    {
      id: 'mop-info', label: 'Note / Info', category: 'MOP',
      content: `<div style="background:#ebf5fb;border-left:4px solid #2980b9;
        padding:10px 14px;margin-bottom:12px;font-size:13px">
        <strong>ℹ Info</strong><br>Information complémentaire ici.
      </div>`
    },
    {
      id: 'mop-list', label: 'Liste à puces', category: 'MOP',
      content: '<ul style="padding-left:20px;margin-bottom:10px"><li>Élément 1</li><li>Élément 2</li><li>Élément 3</li></ul>'
    },
    {
      id: 'mop-numbered', label: 'Liste numérotée', category: 'MOP',
      content: '<ol style="padding-left:20px;margin-bottom:10px"><li>Étape 1</li><li>Étape 2</li><li>Étape 3</li></ol>'
    },
    {
      id: 'mop-hr', label: 'Séparateur', category: 'MOP',
      content: '<hr style="border:none;border-top:1px solid #ccc;margin:16px 0">'
    },
    /* ── Tableaux ── */
    {
      id: 'mop-table-proc', label: 'Procédure 4 col', category: 'Tableaux',
      content: `<table border="1" cellpadding="6" cellspacing="0"
        style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px">
        <thead style="background:#1a5276;color:#fff">
          <tr>
            <th style="width:6%">N°</th>
            <th style="width:52%">Action</th>
            <th style="width:22%">Responsable</th>
            <th style="width:20%">Vérification</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>1</td><td>Description de l'action à réaliser</td><td>NOC</td><td>☐ OK</td></tr>
          <tr style="background:#f2f4f4"><td>2</td><td>Description de l'action à réaliser</td><td>Ops</td><td>☐ OK</td></tr>
          <tr><td>3</td><td>Description de l'action à réaliser</td><td>Tech</td><td>☐ OK</td></tr>
        </tbody>
      </table>`
    },
    {
      id: 'mop-table-rev', label: 'Tableau révisions', category: 'Tableaux',
      content: `<table border="1" cellpadding="6" cellspacing="0"
        style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px">
        <thead style="background:#2c3e50;color:#fff">
          <tr>
            <th style="width:15%">Version</th>
            <th style="width:20%">Date</th>
            <th style="width:30%">Auteur</th>
            <th>Modifications</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>1.0</td><td>2026-01-01</td><td>Prénom Nom</td><td>Création initiale</td></tr>
          <tr style="background:#f2f4f4"><td>1.1</td><td>2026-04-13</td><td>Prénom Nom</td><td>Mise à jour section X</td></tr>
        </tbody>
      </table>`
    },
    {
      id: 'mop-table-contacts', label: 'Contacts / Escalade', category: 'Tableaux',
      content: `<table border="1" cellpadding="6" cellspacing="0"
        style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px">
        <thead style="background:#6c3483;color:#fff">
          <tr>
            <th>Niveau</th>
            <th>Nom / Équipe</th>
            <th>Téléphone</th>
            <th>Remarques</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>N1</td><td>NOC on-call</td><td>+33 6 00 00 00 00</td><td>Disponible 24/7</td></tr>
          <tr style="background:#f2f4f4"><td>N2</td><td>Ops Senior</td><td>+33 6 00 00 00 01</td><td>Escalade après 15 min</td></tr>
          <tr><td>N3</td><td>Responsable technique</td><td>+33 6 00 00 00 02</td><td>Incidents critiques uniquement</td></tr>
        </tbody>
      </table>`
    },
    {
      id: 'mop-table-2col', label: 'Tableau 2 col', category: 'Tableaux',
      content: `<table border="1" cellpadding="6" cellspacing="0"
        style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px">
        <thead style="background:#1a5276;color:#fff">
          <tr><th>Colonne 1</th><th>Colonne 2</th></tr>
        </thead>
        <tbody>
          <tr><td>Valeur A</td><td>Valeur B</td></tr>
          <tr style="background:#f2f4f4"><td>Valeur C</td><td>Valeur D</td></tr>
        </tbody>
      </table>`
    },
    {
      id: 'mop-table-3col', label: 'Tableau 3 col', category: 'Tableaux',
      content: `<table border="1" cellpadding="6" cellspacing="0"
        style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px">
        <thead style="background:#1a5276;color:#fff">
          <tr><th>Étape</th><th>Action</th><th>Responsable</th></tr>
        </thead>
        <tbody>
          <tr><td>1</td><td>Action 1</td><td>NOC</td></tr>
          <tr style="background:#f2f4f4"><td>2</td><td>Action 2</td><td>Ops</td></tr>
        </tbody>
      </table>`
    },
    /* ── Mise en page ── */
    {
      id: 'mop-header', label: 'En-tête MOP', category: 'Mise en page',
      content: `<table border="1" cellpadding="8" cellspacing="0"
        style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px">
        <tbody>
          <tr style="background:#1a5276;color:#fff">
            <td colspan="4" style="text-align:center;font-size:16px;font-weight:700;padding:12px">
              PROCÉDURE D'EXPLOITATION — MOP
            </td>
          </tr>
          <tr>
            <td style="background:#d5d8dc;font-weight:600;width:20%">Projet</td>
            <td style="width:30%">Nom du projet</td>
            <td style="background:#d5d8dc;font-weight:600;width:20%">Référence</td>
            <td>MOP-2026-XXX</td>
          </tr>
          <tr style="background:#f2f4f4">
            <td style="background:#d5d8dc;font-weight:600">Version</td>
            <td>1.0</td>
            <td style="background:#d5d8dc;font-weight:600">Date</td>
            <td>2026-04-13</td>
          </tr>
          <tr>
            <td style="background:#d5d8dc;font-weight:600">Auteur</td>
            <td>Prénom Nom</td>
            <td style="background:#d5d8dc;font-weight:600">Approbateur</td>
            <td>Prénom Nom</td>
          </tr>
          <tr style="background:#f2f4f4">
            <td style="background:#d5d8dc;font-weight:600">Statut</td>
            <td colspan="3">
              <span style="background:#f39c12;color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:3px">BROUILLON</span>
            </td>
          </tr>
        </tbody>
      </table>`
    },
    {
      id: 'mop-signature', label: 'Validation / Signature', category: 'Mise en page',
      content: `<table border="1" cellpadding="8" cellspacing="0"
        style="width:100%;border-collapse:collapse;font-size:13px;margin-top:24px">
        <thead style="background:#2c3e50;color:#fff">
          <tr>
            <th>Rôle</th>
            <th>Nom</th>
            <th>Date</th>
            <th>Signature</th>
          </tr>
        </thead>
        <tbody>
          <tr style="height:48px">
            <td style="font-weight:600">Rédacteur</td>
            <td></td>
            <td></td>
            <td></td>
          </tr>
          <tr style="background:#f2f4f4;height:48px">
            <td style="font-weight:600">Vérificateur</td>
            <td></td>
            <td></td>
            <td></td>
          </tr>
          <tr style="height:48px">
            <td style="font-weight:600">Approbateur</td>
            <td></td>
            <td></td>
            <td></td>
          </tr>
        </tbody>
      </table>`
    },
    {
      id: 'mop-section', label: 'Section', category: 'Mise en page',
      content: '<section style="padding:20px;margin-bottom:16px"></section>'
    },
    {
      id: 'mop-2col', label: 'Deux colonnes', category: 'Mise en page',
      content: `<div style="display:flex;gap:16px;margin-bottom:12px">
        <div style="flex:1;padding:8px;background:#f8f9fa">Colonne gauche</div>
        <div style="flex:1;padding:8px;background:#f8f9fa">Colonne droite</div>
      </div>`
    },
  ];

  /* ── Init GrapeJS ─────────────────────────────────── */
  const editor = grapesjs.init({
    container: '#gjs',
    height: '100%',
    width: 'auto',
    storageManager: false,
    blockManager: {
      blocks: MOP_BLOCKS
    },
    styleManager: {
      sectors: [
        {
          name: 'Typographie',
          properties: ['font-family','font-size','font-weight','color','line-height','text-align']
        },
        {
          name: 'Espacement',
          properties: ['margin','margin-top','margin-right','margin-bottom','margin-left',
                       'padding','padding-top','padding-right','padding-bottom','padding-left']
        },
        {
          name: 'Dimensions',
          properties: ['width','height','max-width','min-height']
        },
        {
          name: 'Arrière-plan',
          properties: ['background-color','background']
        },
        {
          name: 'Bordure',
          properties: ['border','border-radius','border-color','border-width','border-style']
        },
      ]
    },
    canvas: {
      styles: [
        'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap'
      ]
    }
  });

  /* ── Helpers ──────────────────────────────────────── */
  function buildFullHtml() {
    const html = editor.getHtml();
    const css  = editor.getCss();
    return `<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
${css}
  </style>
</head>
<body>
${html}
</body>
</html>`;
  }

  let toastTimer;
  function toast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = isError ? 'error' : '';
    el.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.style.display = 'none'; }, 2500);
  }

  function openModal(id)  { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  /* ── Import ───────────────────────────────────────── */
  document.getElementById('btn-import').onclick = () => openModal('modal-import');
  document.getElementById('btn-import-cancel').onclick = () => closeModal('modal-import');
  document.getElementById('btn-import-ok').onclick = () => {
    const raw = document.getElementById('import-ta').value.trim();
    if (!raw) { toast('Aucun HTML détecté', true); return; }

    const parser = new DOMParser();
    const doc = parser.parseFromString(raw, 'text/html');

    // Extract <style> blocks
    let css = '';
    doc.querySelectorAll('style').forEach(s => { css += s.textContent + '\n'; s.remove(); });

    // Use <body> content if full document, else raw as-is
    const bodyHtml = doc.body ? doc.body.innerHTML : raw;

    editor.setComponents(bodyHtml.trim());
    if (css.trim()) editor.setStyle(css.trim());

    closeModal('modal-import');
    toast('Template chargé ✓');
  };

  /* ── Export ───────────────────────────────────────── */
  document.getElementById('btn-export').onclick = () => {
    document.getElementById('export-ta').value = buildFullHtml();
    openModal('modal-export');
  };
  document.getElementById('btn-export-close').onclick = () => closeModal('modal-export');
  document.getElementById('btn-export-copy').onclick = () => {
    navigator.clipboard.writeText(document.getElementById('export-ta').value)
      .then(() => toast('HTML copié dans le presse-papier ✓'))
      .catch(() => toast('Erreur clipboard', true));
  };

  /* ── Copy direct ──────────────────────────────────── */
  document.getElementById('btn-copy').onclick = () => {
    navigator.clipboard.writeText(buildFullHtml())
      .then(() => toast('HTML copié ✓'))
      .catch(() => toast('Erreur clipboard', true));
  };

  /* ── Undo / Redo ──────────────────────────────────── */
  document.getElementById('btn-undo').onclick = () => editor.UndoManager.undo();
  document.getElementById('btn-redo').onclick = () => editor.UndoManager.redo();

  /* ── Clear ────────────────────────────────────────── */
  document.getElementById('btn-clear').onclick = () => {
    if (!confirm('Vider l\'éditeur ? Cette action est irréversible.')) return;
    editor.setComponents('');
    editor.setStyle('');
    toast('Éditeur vidé');
  };

  /* ── Close modals on overlay click ───────────────── */
  document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
  });

  /* ── Keyboard shortcuts ───────────────────────────── */
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) editor.UndoManager.undo();
    if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) editor.UndoManager.redo();
    if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
  });

  /* ── Import DOCX ─────────────────────────────────── */
  const inputDocx = document.getElementById('input-docx');
  document.getElementById('btn-docx').onclick = () => inputDocx.click();
  inputDocx.addEventListener('change', async () => {
    const file = inputDocx.files[0];
    if (!file) return;
    inputDocx.value = '';
    const fd = new FormData();
    fd.append('file', file);
    toast('Conversion DOCX en cours…');
    try {
      const res = await fetch('/api/docx', { method: 'POST', body: fd });
      const data = await res.json();
      if (!res.ok) { toast(data.error || 'Erreur conversion', true); return; }
      toast(`DOCX importé ✓${data.warnings ? ' (' + data.warnings + ' avertissements)' : ''}`);
    } catch (_) {
      toast('Erreur réseau', true);
    }
  });

  /* ── SSE — connexion API temps réel ─────────────── */
  const sseDot  = document.getElementById('sse-dot');
  let sseSource = null;
  let saveTimer  = null;

  function loadFromApi(data) {
    if (!data.html) return;
    const parser = new DOMParser();
    const doc = parser.parseFromString(data.html, 'text/html');
    let css = data.css || '';
    doc.querySelectorAll('style').forEach(s => { css += s.textContent + '\n'; s.remove(); });
    const bodyHtml = doc.body ? doc.body.innerHTML : data.html;
    editor.setComponents(bodyHtml.trim());
    if (css.trim()) editor.setStyle(css.trim());
  }

  function connectSSE() {
    sseSource = new EventSource('/api/events');
    sseSource.onopen = () => { sseDot.style.color = '#27ae60'; };
    sseSource.onerror = () => {
      sseDot.style.color = '#c0392b';
      sseSource.close();
      setTimeout(connectSSE, 4000);
    };
    sseSource.onmessage = e => {
      try {
        const data = JSON.parse(e.data);
        if (data.type === 'init' && data.html) {
          loadFromApi(data);
        } else if (data.type === 'load') {
          loadFromApi(data);
          toast('Contenu reçu depuis l\'API ✓');
        }
      } catch (_) {}
    };
  }
  connectSSE();

  /* ── Auto-save browser → server (debounced 2 s) ── */
  function scheduleAutoSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      fetch('/api/html', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ html: editor.getHtml(), css: editor.getCss() })
      }).catch(() => {});
    }, 2000);
  }
  editor.on('component:update', scheduleAutoSave);
  editor.on('component:add',    scheduleAutoSave);
  editor.on('component:remove', scheduleAutoSave);
  editor.on('style:change',     scheduleAutoSave);
</script>
</body>
</html>
