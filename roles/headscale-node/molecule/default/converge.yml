---
- name: Converge
  hosts: all
  vars:
    # ============================================================
    # Stub values for site-wide inventory variables
    # (inventory/group_vars/all — not defined in role defaults)
    # ============================================================
    # Identity
    prod_user: molecule
    project_name: molecule-test
    domain_name: molecule.example.com
    project_display_name: Molecule-Test
    # Locale/timezone
    locale: en_US.UTF-8
    timezone: Etc/UTC
    # Prod server
    prod_hostname: molecule-test
    prod_ip: 127.0.0.1
    prod_ssh_port: 22
    # VPN/Headscale
    vpn_headscale_ip: 127.0.0.1
    vpn_hostname: molecule-headscale
    vpn_headscale_url: https://headscale.example.com
    vpn_tailscale_ip: ""
    vpn_network_cidr: 100.64.0.0/10
    vps_tailscale_ip: ""
    vpn_server_public_ip: ""
    # Caddy ACL — no VPN in molecule tests
    caddy_vpn_enforce: false
    caddy_vpn_cidr: 100.64.0.0/10
    # Database passwords (stub)
    postgresql_password: molecule-stub-db-pass
    redis_password: molecule-stub-redis-pass
    # Secrets / API keys (stub)
    litellm_master_key: molecule-stub-llm-key
    litellm_salt_key: molecule-stub-salt-key
    openclaw_api_key: molecule-stub-openclaw-key
    openclaw_gateway_token: molecule-stub-gateway-token
    qdrant_api_key: molecule-stub-qdrant-key
    grafana_admin_password: molecule-stub-grafana-pass
    n8n_encryption_key: molecule-stub-n8n-key
    n8n_owner_password: molecule-stub-n8n-owner
    n8n_webhook_secret: ""
    nocodb_jwt_secret: molecule-stub-nocodb-jwt
    nocodb_api_token: molecule-stub-nocodb-token
    anthropic_api_key: molecule-stub-anthropic-key
    openai_api_key: molecule-stub-openai-key
    openrouter_api_key: ""
    google_gemini_api_key: ""
    byteplus_api_key: ""
    brave_search_api_key: ""
    github_webhook_secret: ""
    # S3 / Object Storage
    s3_access_key: molecule-stub-s3-key
    s3_secret_key: molecule-stub-s3-secret
    s3_bucket_backups: molecule-test-backups
    s3_bucket_shared: molecule-test-shared
    # Grafana admin
    grafana_admin_user: admin
    # NocoDB
    nocodb_s3_bucket: molecule-test-shared
    # Workstation Pi
    workstation_pi_become_pass: molecule-stub-pass
    workstation_pi_ip: 127.0.0.1
    # CouchDB / Obsidian
    couchdb_obsidian_user: obsidian
    # Backup heartbeat
    backup_heartbeat_url: ""
    # Molecule — skip systemd service management (systemctl unavailable in Docker)
    common_molecule_mode: true
    # n8n MCP
    n8n_mcp_auth_token: molecule-stub-mcp-token
    # Notification
    notification_method: telegram
    notification_email: ""
    notification_webhook_url: ""
    # Target environment
    target_env: prod
    # Qdrant
    qdrant_cache_collection: semantic_cache
    qdrant_rag_collection: content_index
    # Docker networks (inventory/group_vars/all/docker.yml)
    docker_network_frontend_subnet: 172.20.1.0/24
    docker_network_backend_subnet: 172.20.2.0/24
    docker_network_monitoring_subnet: 172.20.3.0/24
    docker_network_egress_subnet: 172.20.4.0/24
    docker_network_sandbox_subnet: 172.20.5.0/24
    # SSH
    ssh_authorized_keys:
      - "ssh-ed25519 MOLECULE-STUB-KEY molecule-test"
    # Caddy/admin domain
    caddy_admin_domain: "javisi.molecule.example.com"
    # Subdomains
    n8n_subdomain: mayi
    litellm_subdomain: llm
    grafana_subdomain: tala
    qdrant_subdomain: qd
    nocodb_subdomain: hq
    admin_subdomain: javisi
    obsidian_subdomain: biki
    palais_subdomain: palais
    firefly_subdomain: lola
    zimboo_subdomain: zimboo
  pre_tasks:
    - name: Create molecule test user (not present in geerlingguy Docker image)
      ansible.builtin.user:
        name: molecule
        state: present
        create_home: true
  roles:
    - role: headscale-node
