---
# remotion — defaults
# Remotion server deployed as Docker container on RPi 5 (ARM64)
# Renders video compositions via HTTP API

remotion_install_dir: "/opt/workstation/remotion"
remotion_data_dir: "/opt/workstation/data/remotion"

# Remotion version (npm package version)
remotion_version: "4.0.437"

# Ports
remotion_port: 3200
# V5-B : publication SUPPLÉMENTAIRE sur l'IP tailscale de waza (cf-render Sese
# poste ses jobs d'habillage). La frontière de sécurité = ce bind (interface
# mesh, injoignable d'Internet) + bearer REMOTION_API_TOKEN ; la règle ufw
# (workstation-common) est documentaire (port publié Docker = chaîne FORWARD).
# ⚠️ Si tailscaled n'est pas up au start Docker, le bind échoue — restart
# unless-stopped rattrape au tick suivant.
remotion_mesh_bind_ip: "100.64.0.1"

# Docker resource limits (RPi 5 16GB — Chrome headless for rendering)
remotion_memory_limit: "8G"
remotion_memory_reservation: "512M"
remotion_cpu_limit: "2.0"

# Subdomain (VPN-only via workstation Caddy)
remotion_subdomain: "re"

# Shared creative assets volume (shared with ComfyUI)
creative_assets_dir: "/opt/workstation/data/creative-assets"
