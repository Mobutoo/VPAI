---
# content-factory — defaults (variante Sese-AI, mode FRUGAL)
# Co-localise Content Factory v2 (M0) sur Sese-AI (OVH VPS prod, déjà chargé).
# RÉUTILISE l'infra existante : Postgres prod `javisi_postgresql`, réseaux docker
# `javisi_backend`/`javisi_frontend`, et `javisi_caddy` (vhost ajouté hors de ce rôle).
# 3 services seulement : cf-temporal, cf-api, cf-conductor.
# PAS de Postgres dédié, PAS de Caddy bundlé. Source = sync du repo local (pas de remote git).

# --- Directories (sur Sese) ---
cf_base_dir: "/opt/content-factory"
cf_src_dir: "{{ cf_base_dir }}/src"
cf_config_dir: "{{ cf_base_dir }}/configs"

# --- Source locale (rsync vers Sese — le repo n'a PAS de remote GitHub) ---
cf_local_repo: "/home/mobuone/work/saas/content-factory"

# --- Postgres prod réutilisé (javisi_postgresql, PG18.4 sur réseau javisi_backend) ---
# Superuser confirmé = postgres, authentifié par le mot de passe PARTAGÉ (CLAUDE.md).
cf_pg_container: "javisi_postgresql"
cf_pg_host: "javisi_postgresql"
# postgres reste l'user du PROVISIONING Ansible (CREATE DATABASE/rôle/schéma/migrations)
# + de l'auto-setup Temporal (a besoin de créer temporal/temporal_visibility).
cf_pg_admin_user: "postgres"
# cf_app = user applicatif du DSN cf-api (audit 2026-07-02 C2/A1.1 : casse la chaîne
# superuser). Créé par ce rôle, mot de passe PARTAGÉ {{ postgresql_password }} (CLAUDE.md).
cf_pg_user: "cf_app"
cf_db_name: "content_factory"               # base domaine (schema.sql appliqué 1re init)
cf_temporal_db_name: "temporal"             # créée par auto-setup
cf_temporal_visibility_db_name: "temporal_visibility"  # créée par auto-setup

# --- Réseaux docker EXTERNES pré-existants (déclarés external dans le compose) ---
cf_backend_network: "javisi_backend"        # 172.20.2.0/24 — joint javisi_postgresql + inter-services
cf_frontend_network: "javisi_frontend"      # 172.20.1.0/24 — joint javisi_caddy (routing)

# --- Images (déjà dans versions.yml) ---
cf_temporal_image: "{{ temporal_auto_setup_image }}"   # temporalio/auto-setup:1.29.7

# --- Temporal ---
cf_temporal_container: "cf-temporal"
cf_temporal_host: "cf-temporal:7233"
cf_temporal_namespace: "content-factory"    # créé via auto-setup DEFAULT_NAMESPACE
cf_temporal_retention: "720h"               # 30 j (audit M7) — `describe` affiche `Retention: 720h0m0s`
cf_task_queue: "cf-conductor"

# --- API ---
cf_api_internal_base_url: "http://cf-api:8000"   # utilisé par le conductor (CF_API_BASE_URL)
cf_api_token: "{{ vault_cf_api_token }}"         # Bearer REST cf-api (audit C2/A1.2) — vault, pas de default

# --- Swap (audit F9/A0.2 : /swapfile-cf-temp existe déjà sur Sese — porté en IaC) ---
cf_swap_file: "/swapfile-cf-temp"
cf_swap_size: "4G"

# --- Domaine (vhost ajouté au Caddyfile prod par l'orchestrateur, pas par ce rôle) ---
cf_domain: "cf.{{ domain_name }}"

# --- Plane adapter (projection write-only ; cf services/plane-adapter/README.md) ---
cf_plane_base_url: "{{ vault_plane_base_url | default('https://work.' + domain_name) }}"
cf_plane_api_token: "{{ vault_plane_admin_api_token | default('') }}"
cf_plane_project_id: "{{ vault_cf_plane_project_id | default('e0cb95f0-0ea5-41b8-a3e3-aec45e8cc37e') }}"
cf_plane_workspace_slug: "{{ vault_plane_workspace_slug | default('ewutelo') }}"

# --- Resource limits (Sese 12 GB déjà chargé ; total ajouté ~1.4 GB) ---
cf_temporal_mem_limit: "512m"
cf_api_mem_limit: "512m"
cf_conductor_mem_limit: "384m"
