---
# Palais — Main tasks

- name: Create palais config directory
  ansible.builtin.file:
    path: "{{ palais_config_dir }}"
    state: directory
    owner: "{{ prod_user }}"
    group: "{{ prod_user }}"
    mode: "0750"
  become: true
  tags: [palais]

- name: Create palais data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "1001"
    group: "1001"
    mode: "0750"
  become: true
  loop:
    - "{{ palais_data_dir }}"
    - "{{ palais_data_dir }}/deliverables"
    - "{{ palais_data_dir }}/avatars"
  tags: [palais]

- name: Deploy palais environment file
  ansible.builtin.template:
    src: palais.env.j2
    dest: "{{ palais_config_dir }}/palais.env"
    owner: "{{ prod_user }}"
    group: "{{ prod_user }}"
    mode: "0640"
  become: true
  notify: Restart palais
  tags: [palais]

- name: Ensure palais app directory is writable by deploy user
  ansible.builtin.file:
    path: "/opt/{{ project_name }}/palais-app"
    state: directory
    owner: "{{ prod_user }}"
    group: "{{ prod_user }}"
    mode: "0755"
  become: true
  tags: [palais]

# ── Module 13: Claude Code MCP config on Pi ─────────────────────────────────

- name: Ensure Claude config dir exists on Pi
  ansible.builtin.file:
    path: "/home/{{ workstation_pi_user }}/.claude/servers"
    state: directory
    owner: "{{ workstation_pi_user }}"
    mode: "0750"
  delegate_to: workstation-pi
  # delegate_to / docker exec / synchronize incompatible with molecule
  when:
    - not (common_molecule_mode | default(false))
    - workstation_pi_tailscale_ip | default('') != ''
  tags: [palais, palais-mcp]

- name: Deploy Palais MCP server config to Pi
  ansible.builtin.template:
    src: claude-mcp-config.json.j2
    dest: "/home/{{ workstation_pi_user }}/.claude/servers/palais.json"
    owner: "{{ workstation_pi_user }}"
    mode: "0640"
  delegate_to: workstation-pi
  # delegate_to / docker exec / synchronize incompatible with molecule
  when:
    - not (common_molecule_mode | default(false))
    - workstation_pi_tailscale_ip | default('') != ''
  tags: [palais, palais-mcp]

# ── DB Migration: add columns + extend node_status enum ─────────────────────
# Idempotent (IF NOT EXISTS) — ALTER TYPE ADD VALUE must run outside a transaction
# Guard: skip if postgresql container is not running (first deploy on fresh server)

- name: Check if postgresql container is running (skip migrations if not yet started)
  ansible.builtin.command:
    cmd: docker container inspect {{ project_name }}_postgresql
  register: _pg_container_check
  changed_when: false
  failed_when: false
  become: true
  when: not (common_molecule_mode | default(false))
  tags: [palais]

- name: Palais DB migration — add bio/local_ip/description columns
  ansible.builtin.command:
    cmd: >-
      docker exec -e PGPASSWORD='{{ postgresql_password }}' {{ project_name }}_postgresql psql -U {{ palais_db_user }} -d {{ palais_db_name }}
      -c "ALTER TABLE agents ADD COLUMN IF NOT EXISTS bio text;
          ALTER TABLE nodes ADD COLUMN IF NOT EXISTS local_ip varchar(50);
          ALTER TABLE nodes ADD COLUMN IF NOT EXISTS description text;"
  become: true
  changed_when: false
  register: _palais_db_migrate
  failed_when: _palais_db_migrate.rc != 0
  # delegate_to / docker exec / synchronize incompatible with molecule
  when:
    - not (common_molecule_mode | default(false))
    - _pg_container_check is defined
    - _pg_container_check.rc | default(1) == 0
  tags: [palais]

- name: Palais DB migration — extend node_status enum with busy/degraded
  ansible.builtin.command:
    cmd: >-
      docker exec -e PGPASSWORD='{{ postgresql_password }}' {{ project_name }}_postgresql psql -U {{ palais_db_user }} -d {{ palais_db_name }}
      -c "ALTER TYPE node_status ADD VALUE IF NOT EXISTS 'busy';
          ALTER TYPE node_status ADD VALUE IF NOT EXISTS 'degraded';"
  become: true
  changed_when: false
  register: _palais_db_enum
  failed_when: _palais_db_enum.rc != 0
  # delegate_to / docker exec / synchronize incompatible with molecule
  when:
    - not (common_molecule_mode | default(false))
    - _pg_container_check is defined
    - _pg_container_check.rc | default(1) == 0
  tags: [palais]

- name: Copy Palais v2 migration SQL into postgresql container
  ansible.builtin.command:
    cmd: >-
      docker cp /opt/{{ project_name }}/palais-app/drizzle/0003_palais_v2_new_schema.sql
      {{ project_name }}_postgresql:/tmp/0003_palais_v2_new_schema.sql
  become: true
  changed_when: false
  when:
    - not (common_molecule_mode | default(false))
    - _pg_container_check is defined
    - _pg_container_check.rc | default(1) == 0
  tags: [palais, palais-migrate]

- name: Palais DB v2 migration — run 0003_palais_v2_new_schema.sql
  ansible.builtin.command:
    cmd: >-
      docker exec -e PGPASSWORD='{{ postgresql_password }}' {{ project_name }}_postgresql psql -U {{ palais_db_user }} -d {{ palais_db_name }}
      -f /tmp/0003_palais_v2_new_schema.sql
  become: true
  changed_when: false
  register: _palais_v2_migrate
  failed_when:
    - _palais_v2_migrate.rc != 0
    - "'already exists' not in (_palais_v2_migrate.stderr | default(''))"
  when:
    - not (common_molecule_mode | default(false))
    - _pg_container_check is defined
    - _pg_container_check.rc | default(1) == 0
  tags: [palais, palais-migrate]

- name: Copy Palais 0004 migration SQL into postgresql container
  ansible.builtin.command:
    cmd: >-
      docker cp /opt/{{ project_name }}/palais-app/drizzle/0004_waza_url_and_tmux_fix.sql
      {{ project_name }}_postgresql:/tmp/0004_waza_url_and_tmux_fix.sql
  become: true
  changed_when: false
  when:
    - not (common_molecule_mode | default(false))
    - _pg_container_check is defined
    - _pg_container_check.rc | default(1) == 0
  tags: [palais, palais-migrate]

- name: Palais DB migration 0004 — waza url + tmux fix
  ansible.builtin.command:
    cmd: >-
      docker exec -e PGPASSWORD='{{ postgresql_password }}' {{ project_name }}_postgresql psql -U {{ palais_db_user }} -d {{ palais_db_name }}
      -f /tmp/0004_waza_url_and_tmux_fix.sql
  become: true
  changed_when: false
  register: _palais_0004_migrate
  failed_when:
    - _palais_0004_migrate.rc != 0
    - "'already exists' not in (_palais_0004_migrate.stderr | default(''))"
  when:
    - not (common_molecule_mode | default(false))
    - _pg_container_check is defined
    - _pg_container_check.rc | default(1) == 0
  tags: [palais, palais-migrate]

# ─────────────────────────────────────────────────────────────────────────────

- name: Sync palais application source
  ansible.posix.synchronize:
    src: "{{ palais_app_dir }}/"
    dest: "/opt/{{ project_name }}/palais-app/"
    rsync_opts:
      - "--exclude=node_modules"
      - "--exclude=.svelte-kit"
      - "--exclude=build"
    delete: true
    dest_port: "{{ ansible_port | default(prod_ssh_port) | int }}"
    owner: false
    group: false
  notify: Restart palais
  # delegate_to / docker exec / synchronize incompatible with molecule
  # NOTE: owner/group: false prevents rsync -a from using --owner/-o and --group/-g.
  # Without this, rsync tries to preserve CI runner ownership (runner:runner) on the VPS,
  # causing a permanent ownership mismatch → always CHANGED → fires Restart palais handler.
  when: not (common_molecule_mode | default(false))
  tags: [palais]
