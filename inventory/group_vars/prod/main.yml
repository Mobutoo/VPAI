---
# inventory/group_vars/prod/main.yml — Overrides production

target_env: "prod"

# PostgreSQL tuning (8GB RAM)
postgresql_shared_buffers: "256MB"
postgresql_effective_cache_size: "512MB"
postgresql_work_mem: "16MB"
postgresql_maintenance_work_mem: "128MB"

# Redis
redis_maxmemory: "384mb"

# === Content Factory (M1) ===
# Persistant en prod (2026-07-06) : la vhost publique cf.ewutelo.cloud (Caddy) ET le
# stack cf-api/conductor sont gatés sur ce flag. Le laisser en -e-only ferait tomber
# le vhost — donc périmer le cert ACME — au prochain deploy caddy sans le flag.
content_factory_enabled: true
# Studio Web (atelier.ewutelo.cloud) — même doctrine persistante que ci-dessus : gate
# le vhost Caddy public + le service cf-studio. -e-only ferait tomber le vhost/cert.
studio_enabled: true
# Postiz (postiz.ewutelo.cloud, VPN-only) — Content Factory V-0. Même doctrine
# persistante : gate le vhost Caddy + le stack postiz/postiz-redis.
postiz_enabled: true

# M1 serverless GPU LIVE (2026-07-07) : le conducteur dispatche les takes sur
# l'endpoint RunPod serverless (ddafuqglem08aw, RTX 5090/4090 EU-RO-1, workersMin=0
# = 0$ a l'idle, workersMax=1). Persistant = etat M1-live ; en -e-only, tout
# redeploy conducteur sans le flag repasserait CF_GPU_LIVE=0 (M1 silencieusement
# desarme). PODPILOT_URL = mesh Tailscale waza (conducteur Sese 100.64.0.14 ->
# PodPilot waza 100.64.0.1, leg resolve valide). Budget borne : scale-to-zero +
# workersMax=1 + cap $120/mois (RunPod).
cf_gpu_live: "1"
# C5 AI Director live (endpoint LLM serverless cf-llm hizahkyaanf2lh, Qwen2.5-14B-AWQ,
# US-IL-1, workersMin=0 = 0$ idle — provisionné 2026-07-09, RUNBOOK-LLM-ENDPOINT.md).
cf_llm_live: "1"
# V-4 vision Qwen2.5-VL (endpoint cf-vision 49c91koo2sxl2o, GPU 48 Go, smoke
# multimodal OK 2026-07-10 — RUNBOOK-LLM-ENDPOINT.md §8-ter). Scale-to-zero.
cf_vision_live: "1"
cf_podpilot_url: "http://100.64.0.1:8000"
