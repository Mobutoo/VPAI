# roles/netbox/tasks/main.yml

# 0a. Assertion préalable — vérifier que postgresql_image et redis_image sont définis dans versions.yml
- name: "netbox | Assert postgresql_image defined in versions.yml"
  ansible.builtin.shell:
    executable: /bin/bash
    chdir: "{{ playbook_dir }}/../.."
    cmd: |
      set -euo pipefail
      grep -q 'postgresql_image' inventory/group_vars/all/versions.yml
      grep -q 'redis_image' inventory/group_vars/all/versions.yml
  delegate_to: localhost
  become: false
  changed_when: false
  register: versions_check
  failed_when: false
  tags: [netbox, mediahall, apps]

- name: "netbox | Fail if postgresql_image or redis_image missing from versions.yml"
  ansible.builtin.fail:
    msg: "postgresql_image or redis_image missing from versions.yml — add them before proceeding"
  when: versions_check.rc != 0
  tags: [netbox, mediahall, apps]

# 1. Créer les répertoires
- name: "netbox | Create base directories"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ netbox_base_dir }}"
    - "{{ netbox_config_dir }}"
    - "{{ netbox_media_dir }}"
    - "{{ netbox_reports_dir }}"
    - "{{ netbox_scripts_dir }}"
  become: true
  tags: [netbox, mediahall, apps]

# 2. Déployer le Dockerfile-Plugins
- name: "netbox | Deploy Dockerfile-Plugins"
  ansible.builtin.template:
    src: Dockerfile-Plugins.j2
    dest: "{{ netbox_base_dir }}/Dockerfile-Plugins"
    owner: root
    group: root
    mode: "0644"
  become: true
  tags: [netbox, mediahall, apps]

# 3. Builder l'image custom avec le plugin (idempotent — skip si image déjà présente)
- name: "netbox | Build custom image (skip if already present)"
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -euo pipefail
      if docker image inspect {{ netbox_local_image }} > /dev/null 2>&1; then
        echo "EXISTS:{{ netbox_local_image }}"
      else
        docker build -f {{ netbox_base_dir }}/Dockerfile-Plugins \
          -t {{ netbox_local_image }} \
          {{ netbox_base_dir }}/
        echo "BUILT:{{ netbox_local_image }}"
      fi
  register: netbox_build_result
  changed_when: "'BUILT:' in netbox_build_result.stdout"
  failed_when: netbox_build_result.rc != 0
  become: true
  tags: [netbox, mediahall, apps]

# 4. Déployer la configuration Django
- name: "netbox | Deploy configuration.py"
  ansible.builtin.template:
    src: configuration.py.j2
    dest: "{{ netbox_config_dir }}/configuration.py"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart netbox stack
  tags: [netbox, mediahall, apps]

# 5. Déployer les variables d'environnement (contient les secrets Vault)
- name: "netbox | Deploy netbox.env (secrets)"
  ansible.builtin.template:
    src: netbox.env.j2
    dest: "{{ netbox_base_dir }}/netbox.env"
    owner: root
    group: root
    mode: "0640"
  become: true
  notify: Restart netbox stack
  tags: [netbox, mediahall, apps]

# 6. Déployer le docker-compose
- name: "netbox | Deploy docker-compose.yml"
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ netbox_base_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart netbox stack
  tags: [netbox, mediahall, apps]

# 7. Démarrer la stack
- name: "netbox | Start stack"
  community.docker.docker_compose_v2:
    project_src: "{{ netbox_base_dir }}"
    state: present
  become: true
  tags: [netbox, mediahall, apps]

# 8. Smoke test — attendre que NetBox réponde (règle changed_when explicite)
- name: "netbox | Wait for NetBox API to be ready"
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -euo pipefail
      for i in $(seq 1 24); do
        if curl -s -o /dev/null -w "%{http_code}" http://localhost:{{ netbox_port }}/api/ 2>/dev/null | grep -qE '^(200|401|403)$'; then
          echo "READY"
          exit 0
        fi
        sleep 5
      done
      echo "TIMEOUT" >&2
      exit 1
  register: netbox_ready
  changed_when: false
  failed_when: "'READY' not in netbox_ready.stdout"
  become: true
  tags: [netbox, mediahall, apps]

# 9. Smoke test — vérifier la version NetBox via Server header
- name: "netbox | Smoke test — verify NetBox responding"
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -euo pipefail
      HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:{{ netbox_port }}/api/)
      if echo "${HTTP_CODE}" | grep -qE '^(200|401|403)$'; then
        echo "OK: NetBox responding HTTP ${HTTP_CODE}"
      else
        echo "FAIL: unexpected HTTP ${HTTP_CODE}" >&2
        exit 1
      fi
  register: netbox_version_check
  changed_when: false
  failed_when: netbox_version_check.rc != 0
  become: true
  tags: [netbox, mediahall, apps]

- name: "netbox | Display version"
  ansible.builtin.debug:
    msg: "{{ netbox_version_check.stdout }}"
  tags: [netbox, mediahall, apps]

# 10. collectstatic — nécessaire après installation du plugin (idempotent)
- name: "netbox | Run collectstatic for plugins"
  community.docker.docker_container_exec:
    container: "{{ netbox_base_dir | basename }}-netbox-1"
    user: root
    command: >
      sh -c "chown -R unit:unit /opt/netbox/netbox/static/ 2>/dev/null || true &&
             python /opt/netbox/netbox/manage.py collectstatic --no-input"
  become: true
  changed_when: false
  tags: [netbox, mediahall, apps]
