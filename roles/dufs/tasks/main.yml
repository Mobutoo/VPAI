---
# dufs — tasks
# Deploys: Dufs (lightweight file drop zone — bidirectional upload/download)

- name: Create Dufs data directory
  ansible.builtin.file:
    path: "{{ dufs_data_dir }}"
    state: directory
    owner: "{{ prod_user }}"
    group: "{{ prod_user }}"
    mode: "0755"
  become: true

- name: Create Dufs docker directory
  ansible.builtin.file:
    path: "{{ dufs_docker_dir }}"
    state: directory
    owner: "{{ prod_user }}"
    group: "{{ prod_user }}"
    mode: "0755"
  become: true

- name: Deploy Dufs docker-compose
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ dufs_docker_dir }}/docker-compose.yml"
    owner: "{{ prod_user }}"
    group: "{{ prod_user }}"
    mode: "0644"
  become: true
  notify: Restart dufs stack

- name: Start Dufs stack
  community.docker.docker_compose_v2:
    project_src: "{{ dufs_docker_dir }}"
    state: present
    recreate: always
  become: true
  changed_when: false
  tags: [dufs, phase10]
